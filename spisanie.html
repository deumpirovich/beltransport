<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Транспорт Минска — поставки</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f5f7fa; color: #23263a; margin: 0; padding: 0;}
    .cont { max-width: 1100px; margin: 15px auto; padding: 0 10px; }

    .stickyTop{
      position: sticky;
      top: 0;
      z-index: 100;
      background: #f5f7fa;
      padding-top: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e3e8f5;
    }

    .msg {color:#b25127;margin:5px 0; line-height:1.25;}
    .topbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
    .search {margin:6px 0 7px 0; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
    input[type="text"] {padding:4px 9px; font-size:13px; border-radius:5px; border:1px solid #bbc; width:260px;}
    .tabs{display:flex; gap:6px; flex-wrap:wrap; margin:6px 0 4px 0;}
    .tab{padding:3px 10px; border-radius:10px; border:1px solid #cfd7ea; background:#eef3ff; cursor:pointer; user-select:none; font-size:12px; white-space:nowrap;}
    .tab.active{background:#2543a5; color:#fff; border-color:#2543a5;}
    .counts{color:#5b6b98; font-size:12px; margin-left:auto;}

    .tableWrap{margin-top:8px;}
    table { width: 100%; border-collapse: collapse; background:#fff; border-radius:8px; overflow:hidden; font-size:13px; }

    th, td { padding: 6px 6px; text-align: center; vertical-align: middle; }
    thead th{
      position: static;
      background:#ecf1fa;
      border-bottom: 1.5px solid #abc;
    }

    th { color: #2543a5; font-weight: 600; cursor: pointer; user-select: none; }
    th.active { background: #d2e3ff; }
    tr { border-bottom: 1px solid #eee;}
    tr:hover { background: #f0f5ff;}
    .num { font-weight: bold; color: #2543a5; }
    .no { color:#bbb; font-style:italic; }
    .empty {padding:18px 0; text-align:center; color:#9aa6c3; font-style:italic;}
    .err {margin-top:8px; padding:6px 10px; background:#ffecec; border:1px solid #f2b0b0; border-radius:6px; color:#8b1e1e; font-size:12px; white-space:pre-wrap;}

    thead tr.filters th{
      background:#ecf1fa;
      border-bottom: 1.5px solid #abc;
      padding: 4px 6px 6px 6px;
      cursor: default;
    }
    .colFilter{
      width: 100%;
      box-sizing: border-box;
      padding: 3px 6px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid #bbc;
      outline: none;
      background: #fff;
      text-align: left;
    }
    .colFilter:focus{ border-color:#2543a5; }

    @media (max-width: 720px){
      .cont{margin:10px auto;}
      input[type="text"]{width: 100%;}
      .counts{margin-left:0;}
      th, td{padding:6px 5px;}
      table{font-size:12px;}
      .tab{padding:3px 8px;}
    }

    @media (min-width: 721px){
      table { table-layout: fixed; }
      table th:nth-child(2), table td:nth-child(2) { width: 26%; } /* Модель */
      table th:nth-child(3), table td:nth-child(3) { width: 6%; }  /* Год */
      table th:nth-child(5), table td:nth-child(5) { width: 7%; }  /* Парк */
    }

    td.muted{
      color:#8b95a7;
      font-style:italic;
      font-weight: normal;
    }

    .groupRow td{
      background:#f4f7fc; color:#1c3789; font-weight:700; text-align:center;
      border-top:1px solid #d9e2f7; border-bottom:1px solid #d9e2f7;
      height:30px;
    }
    .groupRow.alt td{ background:#eaf0fb; }
  </style>
</head>
<body>
<div class="cont">
  <div class="stickyTop" id="stickyTop">
    <div class="topbar">
      <div class="msg">
        <span id="monthHint" style="color:#5b6b98;"></span>
      </div>
      <div class="counts"><span id="countShown">0</span> / <span id="countAll">0</span></div>
    </div>

    <div class="search">
      <div style="color:#5b6b98;font-size:12px;" id="updatedAt"></div>
    </div>

    <div class="tabs" id="tabs"></div>
  </div>

  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th data-f="type">Тип</th>
          <th data-f="model">Модель</th>
          <th data-f="year">Год</th>
          <th data-f="deliveryDate" class="active">Дата</th>
          <th data-f="park">Парк</th>
          <th data-f="vehicleNumber">Номер</th>
          <th data-f="factoryNumber">Заводской №</th>
          <th data-f="garageNumber" style="cursor:default;">Гаражный №</th>
          <th data-f="color" style="cursor:default;">Цвет</th>
        </tr>

        <tr class="filters">
          <th><input class="colFilter" data-col="type"></th>
          <th><input class="colFilter" data-col="model"></th>
          <th><input class="colFilter" data-col="year"></th>
          <th><input class="colFilter" data-col="deliveryDate"></th>
          <th><input class="colFilter" data-col="park"></th>
          <th><input class="colFilter" data-col="vehicleNumber"></th>
          <th><input class="colFilter" data-col="factoryNumber"></th>
          <th><input class="colFilter" data-col="garageNumber"></th>
          <th><input class="colFilter" data-col="color"></th>
        </tr>
      </thead>
      <tbody id="data"></tbody>
    </table>
  </div>

  <div class="empty" id="empty" style="display:none;">Нет данных по фильтру</div>
  <div class="err" id="err" style="display:none;"></div>
</div>

<script>
const JSON_URL = './postavki.json';

let DATA = [];
let VIEW = [];

/*
  Приоритетная сортировка при переключении вкладок:
  deliveryDate DESC (месяц по убыванию).
*/
let sortF = "deliveryDate";
let sortDesc = true;

let activeTab = "_new";
let newMonthKey = '';
let hasCurrentMonth = false;

/* ---------------------------
   даты / вкладки
   --------------------------- */
function pad2(n){ return String(n).padStart(2,'0'); }
function monthKeyFromDeliveryDate(s){
  const m = String(s||'').trim().match(/^(\d{1,2})\.(\d{4})$/);
  if(!m) return '';
  return `${pad2(m[1])}.${m[2]}`;
}
function currentMonthKey(){
  const d = new Date();
  return `${pad2(d.getMonth()+1)}.${d.getFullYear()}`;
}
function computeNewMonthKey(){
  const months = new Set();
  DATA.forEach(v=>{
    const mk = monthKeyFromDeliveryDate(v.deliveryDate);
    if(mk) months.add(mk);
  });

  if(!months.size){
    newMonthKey = '';
    hasCurrentMonth = false;
    document.getElementById('monthHint').textContent = '';
    return;
  }

  const cur = currentMonthKey();
  hasCurrentMonth = months.has(cur);

  if(hasCurrentMonth){
    newMonthKey = cur;
  } else {
    newMonthKey = [...months].sort((a,b)=>{
      const [am,ay]=a.split('.'); const [bm,by]=b.split('.');
      return Number(by+bm) - Number(ay+am);
    })[0];
  }

  document.getElementById('monthHint').textContent =
    newMonthKey ? `NEW: ${newMonthKey}${hasCurrentMonth ? '' : ' (последний месяц с поставками)'}` : '';
}

/* ---------------------------
   типы
   --------------------------- */
function normType(t){
  t = (t||'').toString().trim().toLowerCase();
  if(t === 'уах') t = 'туах';
  return t;
}
function typeLabel(t){
  t = normType(t);
  if(t === 'автобус') return 'Автобус';
  if(t === 'троллейбус') return 'Троллейбус';
  if(t === 'трамвай') return 'Трамвай';
  if(t === 'электробус') return 'Электробус';
  if(t === 'туах') return 'ТУАХ';
  return t ? (t[0].toUpperCase()+t.slice(1)) : '—';
}
const TYPE_ORDER = ['автобус','электробус','троллейбус','туах','трамвай'];
const TYPE_LABELS_PL = {'автобус':'Автобусы','электробус':'Электробусы','троллейбус':'Троллейбусы','туах':'ТУАХ','трамвай':'Трамваи'};

/* ---------------------------
   tabs
   --------------------------- */
const TAB_ORDER = [
  {key:'_new', label:'NEW'},
  {key:'автобус', label:'Автобус'},
  {key:'троллейбус', label:'Троллейбус'},
  {key:'трамвай', label:'Трамвай'},
  {key:'электробус', label:'Электробус'},
  {key:'туах', label:'ТУАХ'},
  {key:'_all', label:'Все'}
];

function calcTypeCounts(){
  const m = {};
  DATA.forEach(v=>{
    const t = normType(v.type);
    if(!t) return;
    m[t] = (m[t]||0)+1;
  });
  return m;
}
function countForNew(){
  if(!newMonthKey) return 0;
  return DATA.filter(v => monthKeyFromDeliveryDate(v.deliveryDate) === newMonthKey).length;
}

function setActiveSortHeader(){
  document.querySelectorAll('th[data-f]').forEach(t=>t.classList.remove('active'));
  const th = document.querySelector(`th[data-f="${sortF}"]`);
  if(th) th.classList.add('active');
}

function renderTabs(){
  const wrap = document.getElementById('tabs');
  const typeCounts = calcTypeCounts();
  const newCount = countForNew();

  wrap.innerHTML = TAB_ORDER.map(t => {
    let c = 0;
    if(t.key === '_new') c = newCount;
    else if(t.key === '_all') c = DATA.length;
    else c = (typeCounts[t.key] || 0);

    return `<div class="tab ${activeTab===t.key?'active':''}" data-tab="${t.key}">
      ${t.label} <span style="opacity:.75;">${c}</span>
    </div>`;
  }).join('');

  wrap.querySelectorAll('.tab').forEach(el=>{
    el.onclick = ()=>{
      activeTab = el.getAttribute('data-tab');
      renderTabs();

      // При переключении вкладок: сортировка по дате (deliveryDate) по убыванию
      sortF = 'deliveryDate';
      sortDesc = true;
      setActiveSortHeader();

      render();
    };
  });
}

/* ---------------------------
   модели: базовая модель + брендовый порядок (для model/factoryNumber)
   --------------------------- */
function brandOrderKeyFromModel(model){
  const m = (model||'').toString().toLowerCase();
  if(m.includes('маз') || m.startsWith('maz')) return 1;
  if(m.includes('бкм') || m.includes('bkm')) return 2;
  if(m.includes('неман') || m.includes('neman')) return 3;
  return 4;
}
function compareModelByBrand(aModel, bModel){
  const ka = brandOrderKeyFromModel(aModel);
  const kb = brandOrderKeyFromModel(bModel);
  if(ka !== kb) return ka - kb;
  return (aModel||'').toString().localeCompare((bModel||'').toString(), 'ru');
}
function normalizeModelRaw(s){
  let m = (s||'').toString().trim();
  if(!m) return '';
  m = m.replace(/[–—−]/g,'-').replace(/\s+/g,' ');
  m = m.replace(/\s*-\s*/g,'-');
  return m;
}
function normalizeModelBase(s){
  let m = normalizeModelRaw(s);
  if(!m) return '';
  m = m.replace(/(\d)\.(\d+)\b/g, '$1'); // 103.465 -> 103
  m = m.replace(/--+/g,'-').trim();
  return m;
}

/* ---------------------------
   сортировка номеров (numSortAlg)
   --------------------------- */
const BUS_SERIES_ORDER = "ABEIKMHOPCTX";
const BUS_SERIES_WEIGHT = (() => {
  const m = {};
  for(let i=0;i<BUS_SERIES_ORDER.length;i++) m[BUS_SERIES_ORDER[i]] = i;
  return m;
})();
function canonSeriesChar(ch){
  ch = (ch || '').toString().toUpperCase();
  if(Object.prototype.hasOwnProperty.call(BUS_SERIES_WEIGHT, ch)) return ch;
  const ru2lat = {'А':'A','В':'B','Е':'E','И':'I','І':'I','К':'K','М':'M','Н':'H','О':'O','Р':'P','С':'C','Т':'T','Х':'X'};
  return ru2lat[ch] || ch;
}
function normVehicleNumberForSort(s){
  s = (s || '').toString().trim().toUpperCase();
  s = s.replace(/\s+/g, '');
  s = s.replace(/[A-ZА-ЯІ]/g, ch => canonSeriesChar(ch));
  return s;
}
function isPlateDash7(s){ return /^[A-Z0-9]{6}-7$/.test(s); }
function plateGroupThirdChar(normS){ const ch3 = normS[2] || ''; return /\d/.test(ch3) ? 0 : 1; }
function compareVehicleStringsAsc(a, b){
  const n = Math.max(a.length, b.length);
  for(let i=0;i<n;i++){
    const ac = a[i] || '';
    const bc = b[i] || '';
    if(ac === bc) continue;
    if(!ac) return -1;
    if(!bc) return 1;

    const aw = Object.prototype.hasOwnProperty.call(BUS_SERIES_WEIGHT, ac) ? BUS_SERIES_WEIGHT[ac] : null;
    const bw = Object.prototype.hasOwnProperty.call(BUS_SERIES_WEIGHT, bc) ? BUS_SERIES_WEIGHT[bc] : null;

    if(aw !== null && bw !== null) return aw - bw;
    if(aw !== null && bw === null) return -1;
    if(aw === null && bw !== null) return 1;

    if(ac < bc) return -1;
    if(ac > bc) return 1;
  }
  return 0;
}
function numSortAlg(a, b){
  const anRaw = (a.vehicleNumber || '').toString().trim();
  const bnRaw = (b.vehicleNumber || '').toString().trim();

  if(!anRaw && !bnRaw) return 0;
  if(!anRaw) return 1;
  if(!bnRaw) return -1;

  const an = normVehicleNumberForSort(anRaw);
  const bn = normVehicleNumberForSort(bnRaw);

  const tA = normType(a.type);
  const tB = normType(b.type);

  const applyThirdRuleA = (tA === 'автобус' || tA === 'электробус');
  const applyThirdRuleB = (tB === 'автобус' || tB === 'электробус');

  const aDash7 = isPlateDash7(an);
  const bDash7 = isPlateDash7(bn);

  if(applyThirdRuleA && applyThirdRuleB && aDash7 && bDash7){
    const aG = plateGroupThirdChar(an);
    const bG = plateGroupThirdChar(bn);
    if(aG !== bG) return bG - aG;
  }

  const r = compareVehicleStringsAsc(an, bn);
  if(r !== 0) return r;

  const aU = anRaw.toUpperCase();
  const bU = bnRaw.toUpperCase();
  if(aU < bU) return -1;
  if(aU > bU) return 1;
  return 0;
}

/* прочие sort keys */
function normFactoryForSort(s){
  s = (s || '').toString().trim().toUpperCase();
  s = s.replace(/[\s\-]/g, '');
  const map = {'А':'A','В':'B','С':'C','Е':'E','Н':'H','К':'K','М':'M','О':'O','Р':'P','Т':'T','Х':'X','У':'Y'};
  s = s.replace(/[АВСЕНКМОРТХУ]/g, ch => map[ch] || ch);
  return s;
}
function normDeliveryDateForSort(s){
  const m = String(s || '').trim().match(/^(\d{1,2})\.(\d{4})$/);
  if(!m) return '';
  return m[2] + pad2(m[1]); // YYYYMM
}

/* ---------------------------
   парки: нормализация для групп по парку
   --------------------------- */
function cleanParkRaw(s){
  return (s||'').toString().trim().toLowerCase()
    .replace(/[()]/g,'')
    .replace(/[–—−]/g,'-')
    .replace(/\s+/g,' ')
    .trim();
}
function parkKey(s){
  const src=cleanParkRaw(s);
  if(!src) return '';
  const raw=src.replace(/[.\s\-]/g,'').replace(/№/g,'').replace(/номер/g,'').trim();

  const mAP=raw.match(/^(ап)(\d)$/);
  if(mAP){
    const n=mAP[2];
    if(n==='5') return 'автобусныйпарк5';
    if(n==='6') return 'автобусныйпарк6';
    if(n==='7') return 'автобусныйпарк7';
  }

  const mTP=raw.match(/^(тп)(\d)$/);
  if(mTP){
    const n=mTP[2];
    if(n==='1') return 'транспортныйпарк1';
    if(n==='2') return 'транспортныйпарк2';
    if(n==='4') return 'транспортныйпарк4';
    if(n==='3') return 'троллейбусныйпарк3';
    if(n==='5') return 'троллейбусныйпарк5';
  }

  const mLong = src.match(/(автобусный|транспортный|троллейбусный)\s*парк.*?(\d)/i);
  if(mLong){
    const kind = mLong[1].toLowerCase();
    const n = mLong[2];
    if(kind==='автобусный'){
      if(n==='5') return 'автобусныйпарк5';
      if(n==='6') return 'автобусныйпарк6';
      if(n==='7') return 'автобусныйпарк7';
    }
    if(kind==='транспортный'){
      if(n==='1') return 'транспортныйпарк1';
      if(n==='2') return 'транспортныйпарк2';
      if(n==='4') return 'транспортныйпарк4';
    }
    if(kind==='троллейбусный'){
      if(n==='3') return 'троллейбусныйпарк3';
      if(n==='5') return 'троллейбусныйпарк5';
    }
  }

  if(raw.includes('трамп')) return 'трамвайныйпарк';
  if(raw.includes('трамвайныйпарк')) return 'трамвайныйпарк';
  if(src.includes('трамвайный парк')) return 'трамвайныйпарк';

  return raw;
}
function parkFullLabelFromKey(k){
  if(k==='автобусныйпарк5') return 'Автобусный парк №5';
  if(k==='автобусныйпарк6') return 'Автобусный парк №6';
  if(k==='автобусныйпарк7') return 'Автобусный парк №7';
  if(k==='транспортныйпарк1') return 'Транспортный парк №1';
  if(k==='транспортныйпарк2') return 'Транспортный парк №2';
  if(k==='транспортныйпарк4') return 'Транспортный парк №4';
  if(k==='троллейбусныйпарк3') return 'Троллейбусный парк №3';
  if(k==='троллейбусныйпарк5') return 'Троллейбусный парк №5';
  if(k==='трамвайныйпарк') return 'Трамвайный парк';
  return k||'—';
}
const PARK_ORDER = [
  'автобусныйпарк5',
  'автобусныйпарк6',
  'автобусныйпарк7',
  'транспортныйпарк1',
  'транспортныйпарк2',
  'троллейбусныйпарк3',
  'транспортныйпарк4',
  'троллейбусныйпарк5',
  'трамвайныйпарк'
];
function parkOrderIndex(k){
  const i = PARK_ORDER.indexOf(k);
  return i === -1 ? 999 : i;
}

/* ---------------------------
   эффективное направление сортировки
   --------------------------- */
function isSortDescEffective(){
  if(sortF === 'deliveryDate') return true; // дата всегда desc
  if(sortF === 'vehicleNumber') return (activeTab === '_new') ? false : sortDesc;
  if(sortF === 'year') return (activeTab === '_new') ? false : true;
  return sortDesc;
}

/* ---------------------------
   generalSort:
   ВНИМАНИЕ:
   - при sortF=deliveryDate основной порядок по месяцу desc,
     но ВНУТРИ месяца и типа (в render) мы делаем сортировку по номеру asc вручную.
   --------------------------- */
function generalSort(a, b){
  const effDesc = isSortDescEffective();

  if(sortF === "vehicleNumber") {
    const r = numSortAlg(a, b);
    return effDesc ? -r : r;
  }

  if(sortF === "deliveryDate"){
    const av = normDeliveryDateForSort(a.deliveryDate);
    const bv = normDeliveryDateForSort(b.deliveryDate);
    if(av < bv) return 1;
    if(av > bv) return -1;
    // tie-break не важен, т.к. мы внутри месяца будем сортировать вручную
    return 0;
  }

  if(sortF === "year"){
    const ya = parseInt((a.year||'').toString().trim(), 10);
    const yb = parseInt((b.year||'').toString().trim(), 10);
    const aEmpty = Number.isNaN(ya);
    const bEmpty = Number.isNaN(yb);

    if(aEmpty && !bEmpty) return 1;
    if(!aEmpty && bEmpty) return -1;

    if(!aEmpty && !bEmpty && ya !== yb){
      const r = ya - yb;
      return effDesc ? -r : r;
    }
    const rn = numSortAlg(a, b);
    return effDesc ? -rn : rn;
  }

  if(sortF === "park"){
    const pa = parkKey(a.park);
    const pb = parkKey(b.park);
    const ra = parkOrderIndex(pa);
    const rb = parkOrderIndex(pb);
    if(ra !== rb){
      const r = ra - rb;
      return effDesc ? -r : r;
    }
    const rn = numSortAlg(a, b);
    return effDesc ? -rn : rn;
  }

  if(sortF === "factoryNumber"){
    const av = normFactoryForSort(a.factoryNumber);
    const bv = normFactoryForSort(b.factoryNumber);
    if(av < bv) return effDesc ? 1 : -1;
    if(av > bv) return effDesc ? -1 : 1;
    const r2 = numSortAlg(a, b);
    return effDesc ? -r2 : r2;
  }

  if(sortF === "model"){
    const ma = normalizeModelBase(a.model);
    const mb = normalizeModelBase(b.model);
    const r = compareModelByBrand(ma, mb);
    if(r !== 0) return effDesc ? -r : r;
    const rn = numSortAlg(a, b);
    return effDesc ? -rn : rn;
  }

  const av = (a[sortF]||'').toLowerCase();
  const bv = (b[sortF]||'').toLowerCase();
  if(av < bv) return effDesc ? 1 : -1;
  if(av > bv) return effDesc ? -1 : 1;

  const r2 = numSortAlg(a, b);
  return effDesc ? -r2 : r2;
}

/* ---------------------------
   render helpers
   --------------------------- */
function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[c]));
}
function cell(x){
  const s = (x||'').toString().trim();
  return s ? escapeHTML(s) : '<span class="no">—</span>';
}
function normVehicleNumberForSearch(s){
  s = (s || '').toString().trim().toUpperCase();
  s = s.replace(/[\s\-]/g, '');
  const map = {'A':'А','B':'В','C':'С','E':'Е','H':'Н','K':'К','M':'М','O':'О','P':'Р','T':'Т','X':'Х','Y':'У','I':'И','І':'И'};
  s = s.replace(/[ABCEHKMOPTXYIІ]/g, ch => map[ch] || ch);
  return s;
}
function isMuted(v, key){ return !!(v && v.gray && typeof v.gray === 'object' && v.gray[key]); }
function tdClass(v, key, baseClass=''){
  const c = [];
  if(baseClass) c.push(baseClass);
  if(isMuted(v, key)) c.push('muted');
  return c.length ? ` class="${c.join(' ')}"` : '';
}

/* скрытие пустых колонок */
const COLS = [
  {key:'type', isEmpty: (v)=>!normType(v.type), renderTD: (v)=>escapeHTML(typeLabel(v.type)), tdAttr: (v)=>tdClass(v,'type')},
  {key:'model', isEmpty: (v)=>!(v.model||'').toString().trim(), renderTD: (v)=>cell(v.model), tdAttr: (v)=>tdClass(v,'model')},
  {key:'year', isEmpty: (v)=>!(v.year||'').toString().trim(), renderTD: (v)=>cell(v.year), tdAttr: (v)=>tdClass(v,'year')},
  {key:'deliveryDate', isEmpty: (v)=>!(v.deliveryDate||'').toString().trim(), renderTD: (v)=>cell(v.deliveryDate), tdAttr: (v)=>tdClass(v,'deliveryDate')},
  {key:'park', isEmpty: (v)=>!(v.park||'').toString().trim(), renderTD: (v)=>cell(v.park), tdAttr: (v)=>tdClass(v,'park')},
  {key:'vehicleNumber', isEmpty: (v)=>!(v.vehicleNumber||'').toString().trim(), renderTD: (v)=>cell(v.vehicleNumber), tdAttr: (v)=>tdClass(v,'vehicleNumber','num')},
  {key:'factoryNumber', isEmpty: (v)=>!(v.factoryNumber||'').toString().trim(), renderTD: (v)=>cell(v.factoryNumber), tdAttr: (v)=>tdClass(v,'factoryNumber')},
  {key:'garageNumber', isEmpty: (v)=>!(v.garageNumber||'').toString().trim(), renderTD: (v)=>cell(v.garageNumber), tdAttr: (v)=>tdClass(v,'garageNumber')},
  {key:'color', isEmpty: (v)=>!(v.color||'').toString().trim(), renderTD: (v)=>cell(v.color), tdAttr: (v)=>tdClass(v,'color')}
];

function setColumnVisibility(visibleKeys){
  const keys = new Set(visibleKeys);
  const thRow = document.querySelector('table thead tr:nth-child(1)');
  const filterRow = document.querySelector('table thead tr.filters');

  const ths = Array.from(thRow.children);
  const fths = Array.from(filterRow.children);

  COLS.forEach((c, idx)=>{
    const show = keys.has(c.key);
    if(ths[idx]) ths[idx].style.display = show ? '' : 'none';
    if(fths[idx]) fths[idx].style.display = show ? '' : 'none';
  });
}
function computeVisibleCols(){
  const visible = [];
  for(const c of COLS){
    const anyNonEmpty = VIEW.some(v => !c.isEmpty(v));
    if(anyNonEmpty) visible.push(c.key);
  }
  return visible;
}

/* группировки */
function groupBy(items, keyFn){
  const m=new Map();
  for(const v of items){
    const k=keyFn(v);
    if(!m.has(k)) m.set(k,[]);
    m.get(k).push(v);
  }
  return m;
}
function applyGroupRowAlternation(){
  const tbody = document.getElementById('data');
  const groupRows = Array.from(tbody.querySelectorAll('tr.groupRow'));
  let run = 0;
  for(let i=0;i<groupRows.length;i++){
    const cur = groupRows[i];
    const prev = groupRows[i-1];
    const consecutive = prev && prev.classList.contains('groupRow') && prev.nextElementSibling === cur;
    if(consecutive) run += 1;
    else run = 0;
    cur.classList.toggle('alt', (run % 2) === 0);
  }
}

/* ---------------------------
   render
   --------------------------- */
function render(){
  const colFilters = {};
  document.querySelectorAll('.colFilter').forEach(inp=>{
    const col = inp.getAttribute('data-col');
    const val = (inp.value || '').toString().trim();
    if(val) colFilters[col] = val;
  });

  VIEW = DATA
    .filter(v=>{
      if(activeTab === '_new'){
        if(!newMonthKey) return false;
        const mk = monthKeyFromDeliveryDate(v.deliveryDate);
        if(mk !== newMonthKey) return false;
      }

      if(activeTab !== '_new' && activeTab !== '_all'){
        if(normType(v.type) !== activeTab) return false;
      }

      for(const [col, rawNeedle] of Object.entries(colFilters)){
        const needle = rawNeedle.toString().toLowerCase();

        if(col === 'type'){
          const hay = typeLabel(v.type).toLowerCase();
          if(!hay.includes(needle)) return false;
          continue;
        }

        if(col === 'vehicleNumber'){
          const hay = normVehicleNumberForSearch(v.vehicleNumber);
          const n = normVehicleNumberForSearch(rawNeedle);
          if(!hay.includes(n)) return false;
          continue;
        }

        const hay = (v[col] || '').toString().toLowerCase();
        if(!hay.includes(needle)) return false;
      }

      return true;
    })
    .sort(generalSort);

  document.getElementById('countShown').textContent = VIEW.length;
  document.getElementById('countAll').textContent = DATA.length;

  const tbody = document.getElementById('data');
  const empty = document.getElementById('empty');

  if(!VIEW.length){
    tbody.innerHTML = '';
    empty.style.display = '';
    setColumnVisibility(COLS.map(c=>c.key));
    return;
  }
  empty.style.display = 'none';

  const visibleCols = computeVisibleCols();
  setColumnVisibility(visibleCols);
  const visibleSet = new Set(visibleCols);
  const visibleColsCount = visibleCols.length;

  function groupRow(label){
    return `<tr class="groupRow"><td colspan="${visibleColsCount}">${escapeHTML(label)}</td></tr>`;
  }
  function dataRow(v){
    const tds = COLS
      .filter(c => visibleSet.has(c.key))
      .map(c => `<td${c.tdAttr(v)}>${c.renderTD(v)}</td>`)
      .join('');
    return `<tr class="dataRow">${tds}</tr>`;
  }

  const rows = [];

  if(sortF === 'deliveryDate'){
    /*
      ТВОЁ ТЗ:
      - Месяцы: desc
      - Внутри каждого месяца: подгруппы по типам (Автобусы/Электробусы/...)
      - Внутри каждой подгруппы: сортировка по НОМЕРУ asc
      - Пустые типы внутри месяца не показывать
    */
    const byMonth = groupBy(VIEW, v => monthKeyFromDeliveryDate(v.deliveryDate) || '—');

    // months desc
    const months = Array.from(byMonth.keys()).sort((a,b)=>{
      if(a==='—' && b!=='—') return 1;
      if(a!=='—' && b==='—') return -1;
      const na = (a==='—') ? '' : a.split('.').reverse().join(''); // YYYYMM
      const nb = (b==='—') ? '' : b.split('.').reverse().join('');
      if(na === nb) return 0;
      return (na < nb) ? 1 : -1;
    });

    for(const mk of months){
      const monthArr = byMonth.get(mk) || [];
      if(!monthArr.length) continue;

      rows.push(groupRow(`${mk} (${monthArr.length})`));

      // разбивка внутри месяца по типам + сортировка по номеру ASC
      for(const t of TYPE_ORDER){
        const arrT = monthArr.filter(v => normType(v.type) === t);
        if(!arrT.length) continue;

        arrT.sort(numSortAlg); // ASC

        rows.push(groupRow(`${TYPE_LABELS_PL[t]} (${arrT.length})`));
        for(const v of arrT) rows.push(dataRow(v));
      }

      // "другие типы" (если вдруг встретятся)
      const other = monthArr.filter(v => !TYPE_ORDER.includes(normType(v.type)));
      if(other.length){
        other.sort(numSortAlg);
        rows.push(groupRow(`Другое (${other.length})`));
        for(const v of other) rows.push(dataRow(v));
      }
    }
  }
  else if(sortF === 'vehicleNumber'){
    // группы по типам (без пустых)
    for(const t of TYPE_ORDER){
      const arr = VIEW.filter(v => normType(v.type) === t);
      if(!arr.length) continue;
      rows.push(groupRow(`${TYPE_LABELS_PL[t]} (${arr.length})`));
      for(const v of arr) rows.push(dataRow(v));
    }
    const other = VIEW.filter(v => !TYPE_ORDER.includes(normType(v.type)));
    if(other.length){
      rows.push(groupRow(`Другое (${other.length})`));
      for(const v of other) rows.push(dataRow(v));
    }
  }
  else if(sortF === 'year'){
    const years = Array.from(new Set(VIEW.map(v => (v.year||'').toString().trim()).filter(Boolean)));
    years.sort((a,b)=>(parseInt(a,10)||0)-(parseInt(b,10)||0));
    if(isSortDescEffective()) years.reverse();

    for(const y of years){
      const arr = VIEW.filter(v => (v.year||'').toString().trim() === y);
      if(!arr.length) continue;
      rows.push(groupRow(`${y} (${arr.length})`));
      for(const v of arr) rows.push(dataRow(v));
    }
    const emptyYear = VIEW.filter(v => !(v.year||'').toString().trim());
    if(emptyYear.length){
      rows.push(groupRow(`— (${emptyYear.length})`));
      for(const v of emptyYear) rows.push(dataRow(v));
    }
  }
  else if(sortF === 'park'){
    const byPark = groupBy(VIEW, v => parkKey(v.park) || '');
    for(const pk of PARK_ORDER){
      const arr = byPark.get(pk) || [];
      if(!arr.length) continue;
      rows.push(groupRow(`${parkFullLabelFromKey(pk)} (${arr.length})`));
      for(const v of arr) rows.push(dataRow(v));
    }
    const other = VIEW.filter(v => parkOrderIndex(parkKey(v.park)) === 999);
    if(other.length){
      rows.push(groupRow(`Прочее (${other.length})`));
      for(const v of other) rows.push(dataRow(v));
    }
  }
  else if(sortF === 'type'){
    for(const t of TYPE_ORDER){
      const arr = VIEW.filter(v => normType(v.type) === t);
      if(!arr.length) continue;
      rows.push(groupRow(`${TYPE_LABELS_PL[t]} (${arr.length})`));
      for(const v of arr) rows.push(dataRow(v));
    }
    const other = VIEW.filter(v => !TYPE_ORDER.includes(normType(v.type)));
    if(other.length){
      rows.push(groupRow(`Другое (${other.length})`));
      for(const v of other) rows.push(dataRow(v));
    }
  }
  else if(sortF === 'model' || sortF === 'factoryNumber'){
    // группы по типу -> базовая модель (brand order)
    for(const t of TYPE_ORDER){
      const tArr = VIEW.filter(v => normType(v.type) === t);
      if(!tArr.length) continue;

      rows.push(groupRow(`${TYPE_LABELS_PL[t]} (${tArr.length})`));

      const byModel = groupBy(tArr, v => normalizeModelBase(v.model) || '—');
      const mkeys = Array.from(byModel.keys()).sort(compareModelByBrand);
      if(isSortDescEffective() && sortF === 'model') mkeys.reverse();

      for(const mk of mkeys){
        const arr = byModel.get(mk) || [];
        rows.push(groupRow(`${mk} (${arr.length})`));
        for(const v of arr) rows.push(dataRow(v));
      }
    }
    const otherT = VIEW.filter(v => !TYPE_ORDER.includes(normType(v.type)));
    if(otherT.length){
      rows.push(groupRow(`Другое (${otherT.length})`));
      for(const v of otherT) rows.push(dataRow(v));
    }
  }
  else {
    for(const v of VIEW) rows.push(dataRow(v));
  }

  tbody.innerHTML = rows.join('');
  applyGroupRowAlternation();
}

/* ---------------------------
   UI: клики по заголовкам
   --------------------------- */
document.querySelectorAll('th[data-f]').forEach(th=>{
  th.onclick = ()=>{
    const f = th.getAttribute('data-f');

    // гаражный и цвет: сортировку не делаем
    if(f === 'garageNumber' || f === 'color') return;

    document.querySelectorAll('th[data-f]').forEach(t=>t.classList.remove('active'));
    th.classList.add('active');

    if(sortF === f){
      // deliveryDate всегда desc — не переключаем
      if(f !== 'deliveryDate'){
        sortDesc = !sortDesc;
      }
    } else {
      sortF = f;
      if(f === 'deliveryDate') sortDesc = true;
      else if(f === 'year') sortDesc = (activeTab === '_new') ? false : true;
      else if(f === 'vehicleNumber') sortDesc = (activeTab === '_new') ? false : true;
      else sortDesc = false;
    }

    render();
  };
});

document.addEventListener('input', (e) => {
  if(e.target && e.target.classList && e.target.classList.contains('colFilter')){
    render();
  }
});

/* ---------------------------
   JSON load
   --------------------------- */
function showErr(msg){
  const e = document.getElementById('err');
  e.style.display = '';
  e.textContent = msg;
}
function hideErr(){
  const e = document.getElementById('err');
  e.style.display = 'none';
  e.textContent = '';
}
function pickArray(j){
  if(Array.isArray(j)) return j;
  if(j && Array.isArray(j.vehicles)) return j.vehicles;
  if(j && Array.isArray(j.data)) return j.data;
  if(j && Array.isArray(j.items)) return j.items;
  return [];
}
function mapRow(r){
  return {
    type: r.type || '',
    model: r.model || '',
    year: r.year || '',
    deliveryDate: r.deliveryDate || '',
    park: r.park || '',
    vehicleNumber: (r.licensePlate || r.registrationNumber || r.vehicleNumber || ''),
    factoryNumber: r.factoryNumber || '',
    garageNumber: r.garageNumber || '',
    color: r.color || '',
    gray: (r.gray && typeof r.gray === 'object') ? r.gray : {}
  };
}

async function loadJson(){
  try{
    hideErr();
    const r = await fetch(JSON_URL, {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();

    const arr = pickArray(j);
    const updatedAt = (j && !Array.isArray(j) && j.updatedAt) ? j.updatedAt : '';

    DATA = arr.map(mapRow);
    document.getElementById('updatedAt').textContent = updatedAt ? ('Обновлено: ' + updatedAt) : '';

    computeNewMonthKey();

    activeTab = "_new";
    sortF = "deliveryDate";
    sortDesc = true;
    setActiveSortHeader();

    renderTabs();
    render();
  } catch(err){
    DATA = [];
    renderTabs();
    render();
    showErr('Ошибка: ' + err.message);
  }
}

renderTabs();
loadJson();
</script>
