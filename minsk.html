<!-- minsk.html — Viewer "Реестр общественного транспорта г. Минска" -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Реестр общественного транспорта г. Минска</title>
  <style>
    body { font-family: Arial, sans-serif; font-size: 13px; background: #f5f7fa; color: #23263a; margin: 0; padding: 0;}
    .cont { max-width: 1200px; margin: 15px auto; padding: 0 10px; }

    .stickyTop{
      position: sticky;
      top: 0;
      z-index: 100;
      background: #f5f7fa;
      padding-top: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e3e8f5;
    }

    .topbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
    .tabs{display:flex; gap:6px; flex-wrap:wrap; margin:6px 0 4px 0;}
    .tab{padding:3px 10px; border-radius:10px; border:1px solid #cfd7ea; background:#eef3ff; cursor:pointer; user-select:none; font-size:12px; white-space:nowrap; font-family: Arial, sans-serif;}
    .tab.active{background:#2543a5; color:#fff; border-color:#2543a5;}
    .counts{color:#5b6b98; font-size:12px; margin-left:auto;}
    .search {margin:6px 0 7px 0;}

    .tableWrap{
      margin-top: 8px;
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      max-height: none;
      border-radius: 8px;
      background: transparent;
    }

    table{
      border-collapse: collapse;
      background:#fff;
      border-radius:8px;
      overflow:hidden;
      font-size:13px;
      width: auto;
      table-layout: fixed;
      font-family: Arial, sans-serif;
    }

    th, td{
      padding: 6px 6px;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: Arial, sans-serif;
      line-height: 18px;
      height: 30px;
    }

    thead th{
      position: sticky;
      top: 0;
      z-index: 3;
      background:#ecf1fa;
      border-bottom: 1.5px solid #abc;
    }

    thead tr.filters th{
      position: sticky;
      top: var(--filtersTop, 34px);
      z-index: 3;
      background:#ecf1fa;
      border-bottom: 1.5px solid #abc;
      padding: 4px 6px 6px 6px;
      cursor: default;
      height: auto;
      line-height: normal;
    }

    th { color: #2543a5; font-weight: 600; cursor: pointer; user-select: none; }
    th.active { background: #d2e3ff; }
    tr { border-bottom: 1px solid #eee;}
    tbody tr:hover { background: #f0f5ff;}
    .num { font-weight: bold; color: #2543a5; }

    .no { color:#bbb; font-style:italic; }
    .empty {padding:18px 0; text-align:center; color:#9aa6c3; font-style:italic;}
    .err {margin-top:8px; padding:6px 10px; background:#ffecec; border:1px solid #f2b0b0; border-radius:6px; color:#8b1e1e; font-size:12px; white-space:pre-wrap;}

    .colFilter{
      width: 100%;
      box-sizing: border-box;
      padding: 3px 6px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid #bbc;
      outline: none;
      background: #fff;
      text-align: center;
      min-width: 40px;
      font-family: Arial, sans-serif;
    }
    .colFilter:focus{ border-color:#2543a5; }

    td.muted{ color:#8b95a7; font-style:italic; font-weight: normal; }

    .noteBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid #cfd7ea;
      background: #eef3ff;
      color: #2543a5;
      cursor: pointer;
      user-select:none;
      margin: 0 auto;
      line-height: 18px;
    }
    .noteBtn:hover{ background:#dbe8ff; }

    td.numCell{
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 18px;
    }

    td.liveryCell{
      text-align: left;
      padding-left: 10px;
    }

    .groupRow td{
      background:#f4f7fc;
      color:#1c3789;
      font-weight:700;
      text-align:center;
      border-top:1px solid #d9e2f7;
      border-bottom:1px solid #d9e2f7;
      height: 30px;
    }

    /* modal note */
    .modalBack{
      position:fixed; inset:0; background:rgba(0,0,0,.25);
      display:none; align-items:center; justify-content:center; padding:16px;
      z-index:9999;
    }
    .modal{
      width:min(560px, 96vw);
      background:#fff; border-radius:10px; box-shadow:0 6px 26px rgba(30,40,90,.2);
      padding:12px 12px 10px 12px;
      font-family: Arial, sans-serif;
    }
    .noteTitleLine{
      font-weight:700;
      color:#2543a5;
      font-size:13px;
      margin:0 0 6px 0;
    }
    .noteInfoLine{
      font-weight:700;
      color:#2543a5;
      font-size:11px;
      margin:0 0 10px 0;
      line-height:1.25;
    }
    .noteBody{
      border:1px solid #d9e2f7; border-radius:8px; padding:10px 10px;
      max-height: 60vh; overflow:auto; background:#fbfcff;
      text-align:left;
      color:#2543a5;
      font-size:11px;
      line-height:1.35;
    }
    .modalActions{display:flex; gap:8px; justify-content:flex-end; margin-top:10px;}
    .btn{padding:4px 11px;border-radius:6px;border:none;background:#e3ecfb;color:#2543a5;cursor:pointer;font-size:12px; font-family: Arial, sans-serif;}
    .btn:hover{background:#b2ceff;}

    #measureBox{
      position: absolute;
      left: -99999px;
      top: -99999px;
      visibility: hidden;
      white-space: nowrap;
      padding: 6px 6px;
      font-size: 13px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
<div class="cont">
  <div class="stickyTop" id="stickyTop">
    <div class="topbar">
      <div style="color:#5b6b98;font-size:12px;" id="updatedAt"></div>
      <div class="counts"><span id="countShown">0</span> / <span id="countAll">0</span></div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="search"></div>
  </div>

  <div class="tableWrap" id="tableWrap">
    <table id="tbl">
      <colgroup id="colgroup"></colgroup>

      <thead>
        <tr id="headRow">
          <th data-f="type">Тип</th>
          <th data-f="vehicleNumber" class="active">Номер</th>
          <th data-f="_note" style="cursor:default;"></th>

          <th data-f="garageNumber">Гаражный</th>

        <tr class="filters" id="filterRow">

          <th><input class="colFilter" data-col="year"></th>
          <th><input class="colFilter" data-col="model"></th>
          <th><input class="colFilter" data-col="park"></th>

<div id="measureBox"></div>

<div class="modalBack" id="noteModalBack" onclick="if(event.target.id==='noteModalBack') closeNote()">
  <div class="modal">
    <div class="noteTitleLine" id="noteTitleLine">Примечание</div>
    <div class="noteInfoLine" id="noteInfoLine"></div>
    <div class="noteBody" id="noteBody"></div>
    <div class="modalActions">
      <button class="btn" onclick="closeNote()">Закрыть</button>
    </div>

</div>

<script>
const JSON_URL = './minsk.json';

let DATA = [];
let VIEW = [];
let VIEW_RENDERED = [];

let sortF = "vehicleNumber";
let sortDesc = false;

let activeTab = "_all";

/* ===== tabs (fixed order, renamed, with counts) ===== */
const TAB_ORDER = [
  {key:'автобусныйпарк5', label:'АП5'},
  {key:'автобусныйпарк6', label:'АП6'},
  {key:'автобусныйпарк7', label:'АП7'},
  {key:'транспортныйпарк1', label:'ТП1'},
  {key:'транспортныйпарк2', label:'ТП2'},
  {key:'троллейбусныйпарк3', label:'ТП3'},
  {key:'транспортныйпарк4', label:'ТП4'},
  {key:'троллейбусныйпарк5', label:'ТП5'},
  {key:'трамвайныйпарк', label:'ТрамП'},
  {key:'_all', label:'All'}
];

// tabs where garage sorting is allowed (your list)
const GARAGE_TABS = new Set([
  'автобусныйпарк5','автобусныйпарк6','автобусныйпарк7',
  'транспортныйпарк1','транспортныйпарк2','транспортныйпарк4'
]);

// tabs where factory sorting is allowed (all park tabs)
const FACTORY_TABS = new Set([
  'автобусныйпарк5','автобусныйпарк6','автобусныйпарк7',
  'транспортныйпарк1','транспортныйпарк2','троллейбусныйпарк3',
  'транспортныйпарк4','троллейбусныйпарк5','трамвайныйпарк'
]);

function updateStickyMetrics(){
  const wrap = document.getElementById('tableWrap');
  const stickyTop = document.getElementById('stickyTop');
  if(wrap && stickyTop && wrap.style.overflowY !== 'visible'){
    const topH = Math.max(0, Math.round(stickyTop.getBoundingClientRect().height));
    wrap.style.maxHeight = `calc(100vh - ${topH + 25}px)`;
  }

  const headRow = document.getElementById('headRow');
  if(headRow){
    const h = Math.max(0, Math.ceil(headRow.getBoundingClientRect().height));
    document.documentElement.style.setProperty('--filtersTop', h + 'px');
  }
}
window.addEventListener('resize', ()=> {
  updateStickyMetrics();
  requestAnimationFrame(applyMeasuredColumnWidths);
});

/* ===== latin->cyr and cyr->latin maps ===== */
function canonToRU(ch){
  const map = {
    'A':'А','B':'В','C':'С','E':'Е','H':'Н','K':'К','M':'М','O':'О','P':'Р','T':'Т','X':'Х','Y':'У',
    'I':'И','І':'И'
  };
  const u = (ch||'').toString().toUpperCase();
  return map[u] || u;
}
function canonToLAT(ch){
  const map = {
    'А':'A','В':'B','С':'C','Е':'E','Н':'H','К':'K','М':'M','О':'O','Р':'P','Т':'T','Х':'X','У':'Y','І':'I','И':'I',
    'A':'A','B':'B','C':'C','E':'E','H':'H','K':'K','M':'M','O':'O','P':'P','T':'T','X':'X','Y':'Y','I':'I'
  };
  const u = (ch||'').toString().toUpperCase();
  return map[u] || u;
}

function normPlateRU(s){
  s = (s || '').toString().trim().toUpperCase();
  s = s.replace(/[\s\-]/g, '');
  s = s.replace(/[A-ZА-ЯІ]/g, ch => canonToRU(ch));
  return s;
}
function normAlnumRU(s){
  s = (s||'').toString().trim().toUpperCase();
  s = s.replace(/\s+/g,'');
  s = s.replace(/[A-ZА-ЯІ]/g, ch => canonToRU(ch));
  return s;
}
function normAlnumLAT(s){
  s = (s||'').toString().trim().toUpperCase();
  s = s.replace(/\s+/g,'');
  s = s.replace(/[A-ZА-ЯІ]/g, ch => canonToLAT(ch));
  return s;
}

/* ===== base ===== */
function normType(t){ return (t||'').toString().trim().toLowerCase(); }
function typeLabel(t){
  const nt = normType(t);
  if(!nt) return '—';
  if(nt === 'туах') return 'ТУАХ';
  return nt[0].toUpperCase() + nt.slice(1);
}
function typeOrderKey(t){
  const nt = normType(t);
  if(nt === 'автобус') return 1;
  if(nt === 'электробус') return 2;
  if(nt === 'троллейбус') return 3;
  if(nt === 'туах') return 4;
  if(nt === 'трамвай') return 5;
  return 99;
}
function transportSectionKey(v){
  const t = normType(v.type);
  if(t === 'автобус' || t === 'электробус') return 'bus';
  if(t === 'троллейбус' || t === 'туах') return 'troll';
  if(t === 'трамвай') return 'tram';
  return 'other';
}

/* ===== parks ===== */
function cleanParkRaw(s){
  return (s||'').toString().trim().toLowerCase()
    .replace(/[()]/g,'')
    .replace(/[–—−]/g,'-')
    .replace(/\s+/g,' ')
    .trim();
}
function parkKey(s){
  const src = cleanParkRaw(s);
  if(!src) return '';
  const raw = src.replace(/[.\s\-]/g, '').replace(/№/g,'').replace(/номер/g,'').trim();

  const mAP = raw.match(/^(ап)(\d)$/);
  if(mAP){
    const n = mAP[2];
    if(n === '5') return 'автобусныйпарк5';
    if(n === '6') return 'автобусныйпарк6';
    if(n === '7') return 'автобусныйпарк7';
  }

  const mTP = raw.match(/^(тп)(\d)$/);
  if(mTP){
    const n = mTP[2];
    if(n === '1') return 'транспортныйпарк1';
    if(n === '2') return 'транспортныйпарк2';
    if(n === '4') return 'транспортныйпарк4';
    if(n === '3') return 'троллейбусныйпарк3';
    if(n === '5') return 'троллейбусныйпарк5';
  }

  if(raw === 'трамп' || raw.includes('трамп')) return 'трамвайныйпарк';

  if(raw.includes('автобусныйпарк5')) return 'автобусныйпарк5';
  if(raw.includes('автобусныйпарк6')) return 'автобусныйпарк6';
  if(raw.includes('автобусныйпарк7')) return 'автобусныйпарк7';

  if(raw.includes('транспортныйпарк1')) return 'транспортныйпарк1';
  if(raw.includes('транспортныйпарк2')) return 'транспортныйпарк2';
  if(raw.includes('транспортныйпарк4')) return 'транспортныйпарк4';

  if(raw.includes('троллейбусныйпарк3')) return 'троллейбусныйпарк3';
  if(raw.includes('троллейбусныйпарк5')) return 'троллейбусныйпарк5';

  if(raw.includes('трамвайныйпарк')) return 'трамвайныйпарк';

  return raw;
}
function parkShortLabel(s){
  const k = parkKey(s);
  const tab = TAB_ORDER.find(x=>x.key===k);
  return tab ? tab.label : ((s||'').toString().trim() || '—');
}
function parkFullLabelFromKey(k){
  if(k === 'автобусныйпарк5') return 'Автобусный парк №5';
  if(k === 'автобусныйпарк6') return 'Автобусный парк №6';
  if(k === 'автобусныйпарк7') return 'Автобусный парк №7';

  if(k === 'транспортныйпарк1') return 'Транспортный парк №1';
  if(k === 'транспортныйпарк2') return 'Транспортный парк №2';
  if(k === 'транспортныйпарк4') return 'Транспортный парк №4';

  if(k === 'троллейбусныйпарк3') return 'Троллейбусный парк №3';
  if(k === 'троллейбусныйпарк5') return 'Троллейбусный парк №5';

  if(k === 'трамвайныйпарк') return 'Трамвайный парк';

  return k || '—';
}

/* ===== html utils ===== */
function escapeHTML(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function cellText(x){ return (x||'').toString().trim(); }
function cellHTMLText(x){
  const s = cellText(x);
  return s ? escapeHTML(s) : '<span class="no">—</span>';
}

/* ===== normalize livery/model ===== */
function normalizeQuotesToGuillemets(s){
  s = (s||'').toString();
  s = s.replace(/[“”„"]/g, '"');
  s = s.replace(/"([^"]+)"/g, '«$1»');
  return s;
}
function normalizeDashes(s){
  s = (s||'').toString();
  s = s.replace(/[—–−]/g, '–');
  s = s.replace(/\s-\s/g, ' – ');
  s = s.replace(/\s*–\s*/g, ' – ');
  return s;
}
function normalizeSpaces(s){
  return (s||'').toString().replace(/\s+/g, ' ').trim();
}
function normalizeLivery(s){
  return normalizeSpaces(normalizeDashes(normalizeQuotesToGuillemets(s)));
}
function normalizeModel(s){
  let m = (s||'').toString().trim();
  if(!m) return '';
  m = m.replace(/[–—−]/g,'-').replace(/\s+/g,' ');
  m = m.replace(/^(МАЗ|MAZ)\s*-\s*103\s*[cс]$/i, 'МАЗ-103с');
  m = m.replace(/^(МАЗ|MAZ)\s*-\s*203\s*[cс]$/i, 'МАЗ-203с');
  return m;
}

/* ===== NOTE HTML whitelist ===== */
function sanitizeNoteHTML(html){
  html = String(html ?? '');
  const wrap = document.createElement('div');
  wrap.innerHTML = html;

  const ALLOWED = new Set(['B','I','SPAN','BR','DIV']);
  const ALLOWED_COLOR = new Set(['#23263a','#8b95a7','#b12424']);

  function rgbToHexIfKnown(rgb){
    const m = {
      'rgb(35, 38, 58)': '#23263a',
      'rgb(139, 149, 167)': '#8b95a7',
      'rgb(177, 36, 36)': '#b12424'
    };
    return m[rgb] || '';
  }

  function clean(node){
    for(const ch of Array.from(node.childNodes)){
      if(ch.nodeType === Node.ELEMENT_NODE){
        const tag = ch.tagName.toUpperCase();
        if(!ALLOWED.has(tag)){
          const frag = document.createDocumentFragment();
          while(ch.firstChild) frag.appendChild(ch.firstChild);
          ch.replaceWith(frag);
          continue;
        }
        for(const a of Array.from(ch.attributes || [])) ch.removeAttribute(a.name);
        clean(ch);
      } else if(ch.nodeType === Node.COMMENT_NODE){
        ch.remove();
      } else if(ch.nodeType === Node.TEXT_NODE){
        // ok
      } else {
        ch.remove();
      }
    }
  }
  clean(wrap);

  wrap.querySelectorAll('span').forEach(sp=>{
    const c = (sp.style && sp.style.color) ? sp.style.color.trim().toLowerCase() : '';
    sp.removeAttribute('style');
    if(!c) return;

    const tmp = document.createElement('span');
    tmp.style.color = c;
    document.body.appendChild(tmp);
    const computed = getComputedStyle(tmp).color;
    tmp.remove();

    const hex = rgbToHexIfKnown(computed);
    if(hex && ALLOWED_COLOR.has(hex)) sp.style.color = hex;
  });

  return wrap.innerHTML;
}

/* ===== number sort ===== */
function comparePlateRU(aRU, bRU){
  if(aRU < bRU) return -1;
  if(aRU > bRU) return 1;
  return 0;
}
function getPrefixLettersRU(plateRU){
  const m = plateRU.match(/^([А-Я]{2,3})/);
  return m ? m[1] : '';
}
function prefixLen23RU(plateRU){
  const p = getPrefixLettersRU(plateRU);
  if(!p) return 0;
  return Math.min(3, p.length);
}
function getPrefix2RU(plateRU){
  const m = plateRU.match(/^([А-Я]{2})/);
  return m ? m[1] : '';
}
function getNum4RU(plateRU){
  const m = plateRU.match(/^[А-Я]{2}(\d{4})/);
  return m ? parseInt(m[1], 10) : null;
}
function busPriorityKeyRU(plateRU){
  const p2 = getPrefix2RU(plateRU);
  const n4 = getNum4RU(plateRU);

  if(plateRU.startsWith('КА0385')) return {w: 250, d: 385};
  if(plateRU.startsWith('КЕ0074')) return {w: 850, d: 74};
  if(plateRU.startsWith('КЕ0100')) return {w: 860, d: 100};

  if(p2 === 'КА' && n4 !== null && n4 >= 0 && n4 <= 3999) return {w: 100, d: n4};
  if(p2 === 'КМ') return {w: 150, d: (n4 ?? 9999)};
  if(p2 === 'КВ') return {w: 200, d: (n4 ?? 9999)};
  if(p2 === 'КЕ' && n4 !== null && n4 >= 0 && n4 <= 5999) return {w: 300, d: n4};

  if(p2 === 'КС' && n4 !== null && n4 >= 0 && n4 <= 9999){
    const thousands = Math.floor(n4 / 1000);
    return {w: 400 + thousands, d: n4};
  }

  if(p2 === 'КИ') return {w: 500, d: (n4 ?? 9999)};
  if(p2 === 'КА' && n4 !== null && n4 >= 4000 && n4 <= 8999) return {w: 600, d: n4};
  if(p2 === 'КА' && n4 !== null && n4 >= 9000 && n4 <= 9999) return {w: 700, d: n4};
  if(p2 === 'МА') return {w: 800, d: (n4 ?? 9999)};
  if(p2 === 'КЕ' && n4 !== null && n4 >= 6000 && n4 <= 9999) return {w: 900, d: n4};
  if(p2 === 'КН') return {w: 1000, d: (n4 ?? 9999)};

  const tailOrder = ['АА','АВ','АЕ','АИ','АК','АМ','АН','АО','АР','АС','АТ','АХ','ВА','ВВ'];
  const idx = tailOrder.indexOf(p2);
  if(idx !== -1) return {w: 1100 + idx, d: (n4 ?? 9999)};

  return {w: 9999, d: (n4 ?? 9999)};
}
function numSortAlg(a, b){
  const aRaw = (a.vehicleNumber || '').toString().trim();
  const bRaw = (b.vehicleNumber || '').toString().trim();

  if(!aRaw && !bRaw) return 0;
  if(!aRaw) return 1;
  if(!bRaw) return -1;

  const aRU = normPlateRU(aRaw);
  const bRU = normPlateRU(bRaw);

  const secA = transportSectionKey(a);
  const secB = transportSectionKey(b);

  if(secA === secB && (secA === 'bus' || secA === 'troll')){
    const la = prefixLen23RU(aRU);
    const lb = prefixLen23RU(bRU);
    if(la !== lb) return la - lb;
  }

  if(normType(a.type) === 'автобус' && normType(b.type) === 'автобус'){
    const ak = busPriorityKeyRU(aRU);
    const bk = busPriorityKeyRU(bRU);
    if(ak.w !== bk.w) return ak.w - bk.w;
    if(ak.d !== bk.d) return ak.d - bk.d;
  }

  const r2 = comparePlateRU(aRU, bRU);
  if(r2 !== 0) return r2;

  const aU = aRaw.toUpperCase();
  const bU = bRaw.toUpperCase();
  if(aU < bU) return -1;
  if(aU > bU) return 1;
  return 0;
}

/* ===== garage sort + grouping ===== */
function garageGroupDigit(s){
  s = (s||'').toString().trim();
  const m1 = s.match(/^$(\d)$/);
  if(m1) return parseInt(m1[1],10);
  const m2 = s.match(/^(\d)/);
  if(m2) return parseInt(m2[1],10);
  return null;
}
function garageSortKey(s){
  const raw = (s||'').toString().trim();
  if(!raw) return {bucket2: 999999*2, kind: 9, tail:''};

  const mRange = raw.match(/^$(\d+)$\s*(.*)$/);
  if(mRange){
    const n = parseInt(mRange[1], 10);
    const tail = mRange[2] || '';
    return {bucket2: n*2 + 1, kind: 0, tail: normAlnumRU(tail)};
  }

  const mNum = raw.match(/^(\d+)\s*(.*)$/);
  if(mNum){
    const n = parseInt(mNum[1], 10);
    const tail = mNum[2] || '';
    return {bucket2: n*2, kind: 0, tail: normAlnumRU(tail)};
  }

  return {bucket2: 999999*2, kind: 1, tail: normAlnumRU(raw)};
}
function compareGarage(a, b){
  const ak = garageSortKey(a);
  const bk = garageSortKey(b);
  if(ak.bucket2 !== bk.bucket2) return ak.bucket2 - bk.bucket2;
  if(ak.kind !== bk.kind) return ak.kind - bk.kind;
  if(ak.tail < bk.tail) return -1;
  if(ak.tail > bk.tail) return 1;
  return 0;
}
function sortByGarage(list){
  list.sort((a,b)=>{
    const rg = compareGarage(a.garageNumber, b.garageNumber);
    if(rg !== 0) return rg;
    return numSortAlg(a,b);
  });
}
function groupByGarageColumnDigit(list){
  const groups = new Map();
  const other = [];
  for(const v of list){
    const d = garageGroupDigit(v.garageNumber);
    if(d === null) other.push(v);
    else {
      if(!groups.has(d)) groups.set(d, []);
      groups.get(d).push(v);
    }
  }
  const digits = Array.from(groups.keys()).sort((a,b)=>a-b);
  return {digits, groups, other};
}

/* ===== factory sort key: digits first; cyr->latin lookalike normalization ===== */
function factorySortKeyLatinized(s){
  const raw = (s||'').toString().trim();
  if(!raw) return {empty:1, kind:9, headNum:null, tail:''};

  const norm = normAlnumLAT(raw);
  const m = norm.match(/^(\d+)(.*)$/);
  if(m){
    return {empty:0, kind:0, headNum: parseInt(m[1],10), tail: (m[2]||'')};
  }
  return {empty:0, kind:1, headNum:null, tail: norm};
}
function compareFactoryLatinized(a, b){
  const ak = factorySortKeyLatinized(a);
  const bk = factorySortKeyLatinized(b);
  if(ak.empty !== bk.empty) return ak.empty - bk.empty;
  if(ak.kind !== bk.kind) return ak.kind - bk.kind;
  if(ak.kind === 0){
    if(ak.headNum !== bk.headNum) return (ak.headNum||0) - (bk.headNum||0);
  }
  if(ak.tail < bk.tail) return -1;
  if(ak.tail > bk.tail) return 1;
  return 0;
}

/* ===== modal note ===== */
function openNote(v){
  const info = document.getElementById('noteInfoLine');
  const body = document.getElementById('noteBody');

  const parts = [];
  parts.push(typeLabel(v.type));
  parts.push(cellText(v.vehicleNumber) || '—');
  if(cellText(v.year)) parts.push(cellText(v.year));
  if(cellText(v.model)) parts.push(normalizeModel(v.model));
  if(cellText(v.park)) parts.push(parkFullLabelFromKey(parkKey(v.park)));
  if(cellText(v.garageNumber)) parts.push('гар. ' + cellText(v.garageNumber));
  if(cellText(v.livery)) parts.push(normalizeLivery(v.livery));

  info.textContent = parts.filter(Boolean).join(' • ');

  const safe = sanitizeNoteHTML(v.noteHtml || v.note || '');
  body.innerHTML = safe || '<span class="no">—</span>';

  document.getElementById('noteModalBack').style.display = 'flex';
}
function closeNote(){ document.getElementById('noteModalBack').style.display = 'none'; }

/* ===== general sort ===== */
function generalSort(a, b){
  if(activeTab === '_all' && (sortF === 'garageNumber' || sortF === 'factoryNumber')){
    sortF = 'vehicleNumber';
    sortDesc = false;
  }

  if(sortF === "vehicleNumber"){
    const r = numSortAlg(a, b);
    return sortDesc ? -r : r;
  }

  if(sortF === "garageNumber"){
    const rg = compareGarage(a.garageNumber, b.garageNumber);
    if(rg !== 0) return sortDesc ? -rg : rg;
    const rn = numSortAlg(a,b);
    return sortDesc ? -rn : rn;
  }

  if(sortF === "factoryNumber"){
    // we still group by model in render when sorting by factory, but keep stable base ordering:
    const ma = normalizeModel(a.model).toLowerCase();
    const mb = normalizeModel(b.model).toLowerCase();
    if(ma < mb) return sortDesc ? 1 : -1;
    if(ma > mb) return sortDesc ? -1 : 1;

    const rf = compareFactoryLatinized(a.factoryNumber, b.factoryNumber);
    if(rf !== 0) return sortDesc ? -rf : rf;

    const rn = numSortAlg(a,b);
    return sortDesc ? -rn : rn;
  }

  if(sortF === "type"){
    const av = typeOrderKey(a.type);
    const bv = typeOrderKey(b.type);
    if(av !== bv) return sortDesc ? (bv-av) : (av-bv);
    const r2 = numSortAlg(a, b);
    return sortDesc ? -r2 : r2;
  }

  if(sortF === "year"){
    const ay = (a.year||'').toString().trim();
    const by = (b.year||'').toString().trim();
    const an = ay.match(/^\d{4}$/) ? parseInt(ay,10) : null;
    const bn = by.match(/^\d{4}$/) ? parseInt(by,10) : null;

    if(an !== null && bn !== null){
      if(an !== bn) return sortDesc ? (bn-an) : (an-bn);
    } else {
      if(ay < by) return sortDesc ? 1 : -1;
      if(ay > by) return sortDesc ? -1 : 1;
    }

    const ta = typeOrderKey(a.type);
    const tb = typeOrderKey(b.type);
    if(ta !== tb) return ta - tb;
    return numSortAlg(a,b);
  }

  if(sortF === "model"){
    const ma = normalizeModel(a.model).toLowerCase();
    const mb = normalizeModel(b.model).toLowerCase();
    if(ma < mb) return sortDesc ? 1 : -1;
    if(ma > mb) return sortDesc ? -1 : 1;

    const ta = typeOrderKey(a.type);
    const tb = typeOrderKey(b.type);
    if(ta !== tb) return ta - tb;

    return numSortAlg(a,b);
  }

  if(sortF === "park"){
    const ak = parkKey(a.park);
    const bk = parkKey(b.park);
    if(ak < bk) return sortDesc ? 1 : -1;
    if(ak > bk) return sortDesc ? -1 : 1;
    return numSortAlg(a,b);
  }

  const av = (a[sortF]||'').toString().toLowerCase();
  const bv = (b[sortF]||'').toString().toLowerCase();
  if(av < bv) return sortDesc ? 1 : -1;
  if(av > bv) return sortDesc ? -1 : 1;
  return numSortAlg(a,b);
}

/* ===== columns ===== */
const COLS = [
  {key:'type', label:'Тип'},
  {key:'vehicleNumber', label:'Номер'},
  {key:'_note', label:''},
  {key:'year', label:'Год'},
  {key:'model', label:'Модель'},
  {key:'park', label:'Парк'},
  {key:'garageNumber', label:'Гаражный'},
  {key:'factoryNumber', label:'Заводской'},
  {key:'livery', label:'Цвет / реклама / оформление'}
];

function setColumnVisibility(visibleKeys){
  const keys = new Set(visibleKeys);
  const thRow = document.getElementById('headRow');
  const filterRow = document.getElementById('filterRow');
  const ths = Array.from(thRow.children);
  const fths = Array.from(filterRow.children);

  COLS.forEach((c, idx)=>{
    const show = keys.has(c.key);
    if(ths[idx]) ths[idx].style.display = show ? '' : 'none';
    if(fths[idx]) fths[idx].style.display = show ? '' : 'none';
  });
}
function computeVisibleCols(){
  const visible = [];
  for(const c of COLS){
    const anyNonEmpty = VIEW.some(v => {
      if(c.key === '_note') return !!cellText(v.noteHtml || v.note);
      if(c.key === 'model') return !!cellText(normalizeModel(v.model));
      if(c.key === 'park') return !!cellText(parkShortLabel(v.park));
      if(c.key === 'livery') return !!cellText(normalizeLivery(v.livery));
      return !!cellText(v[c.key]);
    });
    if(anyNonEmpty) visible.push(c.key);
  }
  return visible;
}

/* ===== width measuring ===== */
function textWidthPx(txt){
  const box = document.getElementById('measureBox');
  box.textContent = txt || '';
  return Math.ceil(box.getBoundingClientRect().width);
}
function applyMeasuredColumnWidths(){
  const thRow = document.getElementById('headRow');
  const filterRow = document.getElementById('filterRow');
  const colgroup = document.getElementById('colgroup');
  if(!thRow || !filterRow || !colgroup) return;

  const ths = Array.from(thRow.children);
  const fths = Array.from(filterRow.children);

  const widths = new Array(COLS.length).fill(0);
  const PAD = 18;
  const MIN_W = 44;

  const MAX_W_DEFAULT = 260;
  const MAX_W_NUM = 190;
  const MAX_W_NOTE = 34;
  const MAX_W_LIVERY = 360;

  let maxPlateW = 0;
  {
    const N = VIEW.length <= 800 ? VIEW.length : 800;
    for(let i=0;i<N;i++){
      const t = cellText(VIEW[i].vehicleNumber);
      if(!t) continue;
      maxPlateW = Math.max(maxPlateW, textWidthPx(t) + PAD);
    }
  }

  for(let i=0;i<COLS.length;i++){
    if(!ths[i] || ths[i].style.display === 'none') continue;

    const col = COLS[i];
    let w = textWidthPx(col.label) + PAD;

    const inp = fths[i] ? fths[i].querySelector('input') : null;
    if(inp){
      const val = (inp.value || '').trim();
      if(val) w = Math.max(w, textWidthPx(val) + PAD);
      w = Math.max(w, 70);
    }

    const N = VIEW.length <= 500 ? VIEW.length : 500;
    for(let k=0;k<N;k++){
      const v = VIEW[k];
      let txt = '';
      if(col.key === 'type') txt = typeLabel(v.type);
      else if(col.key === 'park') txt = parkShortLabel(v.park);
      else if(col.key === 'livery') txt = normalizeLivery(v.livery);
      else if(col.key === 'model') txt = normalizeModel(v.model);
      else if(col.key === '_note') txt = '';
      else txt = cellText(v[col.key]);
      if(!txt) continue;
      w = Math.max(w, textWidthPx(txt) + PAD);
    }

    w = Math.max(w, MIN_W);

    if(col.key === 'vehicleNumber'){
      w = Math.max(w, Math.min(maxPlateW, MAX_W_NUM));
      w = Math.min(w, MAX_W_NUM);
    } else if(col.key === '_note'){
      w = MAX_W_NOTE;
    } else if(col.key === 'livery'){
      w = Math.min(w, MAX_W_LIVERY);
    } else {
      w = Math.min(w, MAX_W_DEFAULT);
    }

    widths[i] = w;
  }

  colgroup.innerHTML = '';
  for(let i=0;i<COLS.length;i++){
    const colEl = document.createElement('col');
    colEl.style.width = (widths[i] > 0 ? widths[i] : 0) + 'px';
    colgroup.appendChild(colEl);
  }
}

/* ===== tabs render ===== */
function calcParkCounts(){
  const m = {};
  DATA.forEach(v=>{
    const k = parkKey(v.park);
    if(!k) return;
    m[k] = (m[k]||0)+1;
  });
  return m;
}
function renderTabs(){
  const wrap = document.getElementById('tabs');
  const parkCounts = calcParkCounts();

  wrap.innerHTML = TAB_ORDER.map(t => {
    const c = (t.key === '_all') ? DATA.length : (parkCounts[t.key] || 0);
    return `<div class="tab ${activeTab===t.key?'active':''}" data-tab="${escapeHTML(t.key)}">
      ${escapeHTML(t.label)} <span style="opacity:.75;">(${c})</span>
    </div>`;
  }).join('');

  wrap.querySelectorAll('.tab').forEach(el=>{
    el.onclick = ()=>{
      activeTab = el.getAttribute('data-tab');

      // default sort ALWAYS number on tab switch
      sortF = 'vehicleNumber';
      sortDesc = false;
      document.querySelectorAll('th[data-f]').forEach(t=>t.classList.remove('active'));
      const thNum = document.querySelector('th[data-f="vehicleNumber"]');
      if(thNum) thNum.classList.add('active');

      renderTabs();
      render();
    };
  });
}

/* ===== sorting ui ===== */
document.querySelectorAll('th[data-f]').forEach(th=>{
  th.onclick = ()=>{
    const f = th.getAttribute('data-f');

    if(f === '_note' || f === 'livery') return;

    if(activeTab === '_all' && (f === 'garageNumber' || f === 'factoryNumber')) return;

    if(f === 'garageNumber' && !GARAGE_TABS.has(activeTab)) return;
    if(f === 'factoryNumber' && !FACTORY_TABS.has(activeTab)) return;

    document.querySelectorAll('th[data-f]').forEach(t=>t.classList.remove('active'));
    th.classList.add('active');

    if(sortF === f) sortDesc = !sortDesc;
    else {
      sortF = f;
      sortDesc = false;
    }
    render();
  };
});

document.addEventListener('input', (e) => {
  if(e.target && e.target.classList && e.target.classList.contains('colFilter')){
    render();
  }
});

/* ===== errors ===== */
function showErr(msg){
  const e = document.getElementById('err');
  e.style.display = '';
  e.textContent = msg;
}
function hideErr(){
  const e = document.getElementById('err');
  e.style.display = 'none';
  e.textContent = '';
}

/* ===== import ===== */
function pickArray(j){
  if(Array.isArray(j)) return j;
  if(j && Array.isArray(j.vehicles)) return j.vehicles;
  if(j && Array.isArray(j.data)) return j.data;
  if(j && Array.isArray(j.items)) return j.items;
  return [];
}
function mapRow(r){
  return {
    type: r.type || '',
    vehicleNumber: (r.vehicleNumber || r.licensePlate || r.registrationNumber || ''),
    year: r.year || '',
    model: r.model || '',
    park: r.park || '',
    garageNumber: r.garageNumber || '',
    factoryNumber: r.factoryNumber || '',
    livery: r.livery || '',
    noteHtml: r.noteHtml || r.note || '',
    gray: (r.gray && typeof r.gray === 'object') ? r.gray : {}
  };
}

async function loadJson(){
  try{
    hideErr();
    const r = await fetch(JSON_URL, {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();

    const arr = pickArray(j);
    const updatedAt = (j && !Array.isArray(j) && j.updatedAt) ? j.updatedAt : '';

    DATA = arr.map(mapRow);
    document.getElementById('updatedAt').textContent = updatedAt ? ('Обновлено: ' + updatedAt) : '';

    activeTab = "_all";
    sortF = "vehicleNumber";
    sortDesc = false;

    renderTabs();
    render();
  } catch(err){
    DATA = [];
    renderTabs();
    render();
    showErr('Ошибка: ' + err.message);
  }
}

/* ===== render ===== */
function render(){
  VIEW_RENDERED = [];

  const colFilters = {};
  document.querySelectorAll('.colFilter').forEach(inp=>{
    const col = inp.getAttribute('data-col');
    const val = (inp.value || '').toString().trim();
    if(val) colFilters[col] = val;
  });

  VIEW = DATA.filter(v=>{
    if(activeTab !== '_all'){
      if(parkKey(v.park) !== activeTab) return false;
    }

    for(const [col, rawNeedle] of Object.entries(colFilters)){
      const needle = rawNeedle.toString().toLowerCase();

      if(col === 'type'){
        const hay = typeLabel(v.type).toLowerCase();
        if(!hay.includes(needle)) return false;
        continue;
      }

      if(col === 'vehicleNumber' || col === 'garageNumber' || col === 'factoryNumber'){
        const hay = normPlateRU(v[col]);
        const n = normPlateRU(rawNeedle);
        if(!hay.includes(n)) return false;
        continue;
      }

      if(col === 'park'){
        const hay = parkShortLabel(v.park).toLowerCase();
        const hay2 = parkKey(v.park);
        if(!hay.includes(needle) && !hay2.includes(needle.replace(/[.\s\-]/g,''))) return false;
        continue;
      }

      if(col === 'livery'){
        const hay = normalizeLivery(v.livery).toLowerCase();
        if(!hay.includes(needle)) return false;
        continue;
      }

      if(col === 'model'){
        const hay = normalizeModel(v.model).toLowerCase();
        if(!hay.includes(needle)) return false;
        continue;
      }

      const hay = (v[col] || '').toString().toLowerCase();
      if(!hay.includes(needle)) return false;
    }

    return true;
  });

  VIEW.sort(generalSort);

  document.getElementById('countShown').textContent = VIEW.length;
  document.getElementById('countAll').textContent = DATA.length;

  const tbody = document.getElementById('data');
  const empty = document.getElementById('empty');

  if(!VIEW.length){
    tbody.innerHTML = '';
    empty.style.display = '';
    setColumnVisibility(COLS.map(c=>c.key));
    requestAnimationFrame(()=> {
      updateStickyMetrics();
      applyMeasuredColumnWidths();
    });
    return;
  }
  empty.style.display = 'none';

  const visibleCols = computeVisibleCols();
  setColumnVisibility(visibleCols);
  const visibleSet = new Set(visibleCols);

  const rows = [];

  function pushDataRow(v){
    VIEW_RENDERED.push(v);

    const num = cellText(v.vehicleNumber);
    const hasNote = !!cellText(v.noteHtml || v.note);
    const cells = [];

    if(visibleSet.has('type')) cells.push(`<td${tdClass(v,'type')}>${escapeHTML(typeLabel(v.type))}</td>`);
    if(visibleSet.has('vehicleNumber')) cells.push(`<td${tdClass(v,'vehicleNumber','num numCell')} title="${escapeHTML(num)}">${cellHTMLText(num)}</td>`);
    if(visibleSet.has('_note')){
      cells.push(`<td${tdClass(v,'noteHtml','')} style="padding:6px 4px;">
        ${hasNote ? `<span class="noteBtn" title="Примечание">&#10148;</span>` : ``}
      </td>`);
    }
    if(visibleSet.has('year')) cells.push(`<td${tdClass(v,'year')}>${cellHTMLText(v.year)}</td>`);
    if(visibleSet.has('model')) cells.push(`<td${tdClass(v,'model')}>${cellHTMLText(normalizeModel(v.model))}</td>`);
    if(visibleSet.has('park')) cells.push(`<td${tdClass(v,'park')}>${cellHTMLText(parkShortLabel(v.park))}</td>`);
    if(visibleSet.has('garageNumber')) cells.push(`<td${tdClass(v,'garageNumber')}>${cellHTMLText(v.garageNumber)}</td>`);
    if(visibleSet.has('factoryNumber')) cells.push(`<td${tdClass(v,'factoryNumber')}>${cellHTMLText(v.factoryNumber)}</td>`);
    if(visibleSet.has('livery')) cells.push(`<td${tdClass(v,'livery','liveryCell')}>${cellHTMLText(normalizeLivery(v.livery))}</td>`);

    rows.push(`<tr class="dataRow">${cells.join('')}</tr>`);
  }

  const isAll = (activeTab === '_all');

  // RESTORED: group headers with counters for default "number" in ALL (and park tabs) — 3 sections
  if(sortF === 'vehicleNumber' && !sortDesc){
    const order = ['bus','troll','tram','other'];
    const labels = {
      bus: 'Автобусы и электробусы',
      troll: 'Троллейбусы и ТУАХ',
      tram: 'Трамваи',
      other: 'Другое'
    };

    for(const sec of order){
      const subset = VIEW.filter(v => transportSectionKey(v) === sec);
      if(!subset.length) continue;

      rows.push(`<tr class="groupRow"><td colspan="${visibleCols.length}">
        ${escapeHTML(`${labels[sec]} (${subset.length})`)}
      </td></tr>`);
      for(const v of subset) pushDataRow(v);
    }
  }
  // Garage sort in allowed tabs: group headers with counters
  else if(!isAll && sortF === 'garageNumber' && GARAGE_TABS.has(activeTab)){
    const list = VIEW.slice();
    sortByGarage(list);
    const {digits, groups, other} = groupByGarageColumnDigit(list);

    for(const d of digits){
      const arr = groups.get(d) || [];
      rows.push(`<tr class="groupRow"><td colspan="${visibleCols.length}">
        ${escapeHTML(`${d} колонна (${arr.length})`)}
      </td></tr>`);
      for(const v of arr) pushDataRow(v);
    }

    if(other.length){
      rows.push(`<tr class="groupRow"><td colspan="${visibleCols.length}">
        ${escapeHTML(`Прочее (${other.length})`)}
      </td></tr>`);
      for(const v of other) pushDataRow(v);
    }
  }
  // Factory sort in park tabs: group by model + headers + counters
  else if(!isAll && sortF === 'factoryNumber' && FACTORY_TABS.has(activeTab)){
    const byModel = new Map();
    for(const v of VIEW){
      const m = normalizeModel(v.model) || '—';
      if(!byModel.has(m)) byModel.set(m, []);
      byModel.get(m).push(v);
    }

    const models = Array.from(byModel.keys()).sort((a,b)=>{
      const aa = a.toLowerCase(), bb = b.toLowerCase();
      if(aa < bb) return -1;
      if(aa > bb) return 1;
      return 0;
    });

    for(const mk of models){
      const arr = byModel.get(mk) || [];
      arr.sort((a,b)=>{
        const rF = compareFactoryLatinized(a.factoryNumber, b.factoryNumber);
        if(rF !== 0) return sortDesc ? -rF : rF;
        const rn = numSortAlg(a,b);
        return sortDesc ? -rn : rn;
      });

      rows.push(`<tr class="groupRow"><td colspan="${visibleCols.length}">
        ${escapeHTML(`${mk} (${arr.length})`)}
      </td></tr>`);
      for(const v of arr) pushDataRow(v);
    }
  }
  // Other sorts: keep plain list (no extra group headers)
  else {
    for(const v of VIEW) pushDataRow(v);
  }

  tbody.innerHTML = rows.join('');

  tbody.querySelectorAll('.noteBtn').forEach(btn=>{
    btn.onclick = (e)=>{
      e.preventDefault();
      const tr = btn.closest('tr.dataRow');
      if(!tr) return;
      const dataRows = Array.from(tbody.querySelectorAll('tr.dataRow'));
      const idx = dataRows.indexOf(tr);
      if(idx >= 0 && VIEW_RENDERED[idx]) openNote(VIEW_RENDERED[idx]);
    };
  });

  requestAnimationFrame(()=> {
    updateStickyMetrics();
    applyMeasuredColumnWidths();
  });
}

/* ===== init ===== */
renderTabs();
loadJson();
</script>
