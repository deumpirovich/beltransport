<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Viewer</title>

<style>
:root{--blue:#2543a5;--bg:#f5f7fa;--line:#eee;--head:#ecf1fa}
body{font-family:Arial,system-ui,sans-serif;background:var(--bg);margin:0}
.container{max-width:1200px;margin:auto;padding:10px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tab{padding:4px 10px;border-radius:10px;border:1px solid #cfd7ea;background:#eef3ff;cursor:pointer;font-size:12px}
.tab.active{background:var(--blue);color:#fff}
table{border-collapse:collapse;background:#fff;width:100%;font-size:13px}
th,td{border-bottom:1px solid var(--line);padding:6px;text-align:center;white-space:nowrap}
th{background:var(--head);cursor:pointer;color:var(--blue)}
.filters input{width:100%;box-sizing:border-box;padding:4px;border:1px solid #d7deef;border-radius:6px}
.groupRow td{background:#f4f7fc;font-weight:bold;color:#1c3789;text-align:left}
.num{color:var(--blue);font-weight:bold}
.small{font-size:12px;color:#6b7280}
</style>
</head>

<body>
<div class="container">

  <div class="tabs" id="tabs"></div>

  <table>
    <thead>
      <tr>
        <th data-f="type">Тип</th>
        <th data-f="vehicleNumber">Номер</th>
        <th></th>
        <th data-f="year">Год</th>
        <th data-f="model">Модель</th>
        <th data-f="park">Парк</th>
        <th data-f="garageNumber">Гаражный</th>
        <th data-f="factoryNumber">Заводской</th>
        <th data-f="livery">Цвет</th>
      </tr>
      <tr class="filters">
        <th><input data-col="type" placeholder="фильтр"></th>
        <th><input data-col="vehicleNumber" placeholder="фильтр"></th>
        <th></th>
        <th><input data-col="year" placeholder="фильтр"></th>
        <th><input data-col="model" placeholder="фильтр"></th>
        <th><input data-col="park" placeholder="фильтр"></th>
        <th><input data-col="garageNumber" placeholder="фильтр"></th>
        <th><input data-col="factoryNumber" placeholder="фильтр"></th>
        <th><input data-col="livery" placeholder="фильтр"></th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <div class="small" id="status"></div>

</div>

<script>
/* =========================
   Конфиг
========================= */
const JSON_URL = "./minsk.json";

const TAB_ORDER = [
  {key:"автобусныйпарк5",label:"АП5"},
  {key:"автобусныйпарк6",label:"АП6"},
  {key:"автобусныйпарк7",label:"АП7"},
  {key:"транспортныйпарк1",label:"ТП1"},
  {key:"транспортныйпарк2",label:"ТП2"},
  {key:"троллейбусныйпарк3",label:"ТП3"},
  {key:"транспортныйпарк4",label:"ТП4"},
  {key:"троллейбусныйпарк5",label:"ТП5"},
  {key:"трамвайныйпарк",label:"ТрамП"},
  {key:"_all",label:"All"}
];

let DATA = [];
let VIEW = [];

let sortF = "vehicleNumber";
let sortDesc = false;
let activeTab = "_all";

/* =========================
   Утилиты
========================= */
function normType(t){
  return (t || "").toString().trim().toLowerCase();
}

/* латиница → кириллица + чистка */
function normPlateRU(s){
  return (s || "")
    .toString()
    .trim()
    .toUpperCase()
    .replace(/[\s\-]/g,"")
    .replace(/A/g,"А")
    .replace(/B/g,"В")
    .replace(/C/g,"С")
    .replace(/E/g,"Е")
    .replace(/H/g,"Н")
    .replace(/K/g,"К")
    .replace(/M/g,"М")
    .replace(/O/g,"О")
    .replace(/P/g,"Р")
    .replace(/T/g,"Т")
    .replace(/X/g,"Х")
    .replace(/Y/g,"У");
}

function transportSectionKey(v){
  const t = normType(v.type);
  if(t === "автобус" || t === "электробус") return "bus";
  if(t === "троллейбус" || t === "туах") return "troll";
  if(t === "трамвай") return "tram";
  return "other";
}

function sectionOrderKey(sec){
  if(sec === "bus") return 1;
  if(sec === "troll") return 2;
  if(sec === "tram") return 3;
  return 9;
}

/* Приоритет автобусных серий (расширяйте при необходимости) */
function busPriorityKeyRU(plate){
  const pref = plate.match(/^([А-Я]{2,3})/);
  const p = pref ? pref[1] : "";
  if(p === "КА") return {w:1,d:0};
  if(p === "КЕ") return {w:2,d:0};
  if(p === "КС") return {w:3,d:0};
  return {w:9,d:0};
}

/* =========================
   Сортировка номеров (ТОЛЬКО номер)
========================= */
function numSortAlg(a, b){
  const aRaw = (a.vehicleNumber || "").toString().trim();
  const bRaw = (b.vehicleNumber || "").toString().trim();

  if(!aRaw && !bRaw) return 0;
  if(!aRaw) return 1;
  if(!bRaw) return -1;

  const aRU = normPlateRU(aRaw);
  const bRU = normPlateRU(bRaw);

  /* 1 — длина префикса (2 раньше 3) */
  const prefA = aRU.match(/^([А-Я]{2,3})/);
  const prefB = bRU.match(/^([А-Я]{2,3})/);

  const lenA = prefA ? prefA[1].length : 0;
  const lenB = prefB ? prefB[1].length : 0;

  if(lenA !== lenB) return lenA - lenB;

  /* 2 — сравнение букв */
  if(prefA && prefB){
    if(prefA[1] < prefB[1]) return -1;
    if(prefA[1] > prefB[1]) return 1;
  }

  /* 3 — автобусный приоритет */
  if(normType(a.type) === "автобус" && normType(b.type) === "автобус"){
    const ak = busPriorityKeyRU(aRU);
    const bk = busPriorityKeyRU(bRU);
    if(ak.w !== bk.w) return ak.w - bk.w;
    if(ak.d !== bk.d) return ak.d - bk.d;
  }

  /* 4 — числовая часть */
  const numA = aRU.match(/\d+/);
  const numB = bRU.match(/\d+/);

  if(numA && numB){
    const nA = parseInt(numA[0],10);
    const nB = parseInt(numB[0],10);
    if(nA !== nB) return nA - nB;
  }

  /* fallback */
  if(aRU < bRU) return -1;
  if(aRU > bRU) return 1;
  return 0;
}

/* =========================
   Гаражные: колонна по ПЕРВОЙ цифре, (x) после x
========================= */
function garageColumnDigitFromValue(s){
  s = (s||"").toString().trim();
  const m1 = s.match(/^$(\d)$/);
  if(m1) return parseInt(m1[1],10);
  const m2 = s.match(/^(\d)/);
  if(m2) return parseInt(m2[1],10);
  return null;
}

function garageSortAlg(a,b){
  const ak = (a.garageNumber||"").toString().trim();
  const bk = (b.garageNumber||"").toString().trim();

  const ca = garageColumnDigitFromValue(ak);
  const cb = garageColumnDigitFromValue(bk);

  // null уводим вниз
  if(ca == null && cb != null) return 1;
  if(ca != null && cb == null) return -1;

  if(ca !== cb) return ca - cb;

  const pa = ak.startsWith("(");
  const pb = bk.startsWith("(");
  if(pa !== pb) return pa ? 1 : -1;

  return ak.localeCompare(bk, "ru");
}

/* =========================
   Central sort
========================= */
function generalSort(a,b){

  // 0) общий порядок секций транспорта всегда
  const secA = transportSectionKey(a);
  const secB = transportSectionKey(b);
  if(secA !== secB) return sectionOrderKey(secA) - sectionOrderKey(secB);

  // 1) поле сортировки
  let r = 0;

  if(sortF === "vehicleNumber"){
    r = numSortAlg(a,b);
  }else if(sortF === "garageNumber"){
    r = garageSortAlg(a,b);
  }else{
    const av = (a[sortF] ?? "").toString();
    const bv = (b[sortF] ?? "").toString();
    r = av.localeCompare(bv, "ru", {numeric:true, sensitivity:"base"});
    if(r === 0) r = numSortAlg(a,b); // fallback стабильности
  }

  return sortDesc ? -r : r;
}

/* =========================
   Tabs (парки)
========================= */
function parkMatchesTab(parkValue, tabKey){
  const p = (parkValue || "").toString().toLowerCase();

  if(tabKey === "_all") return true;

  // Примитивно: ищем "парк5" / "парк 5" / "5" для АП/ТП и т.п.
  // Если у вас были строгие ключи — скажите, подстрою под ваш формат.
  const k = tabKey.toLowerCase();

  if(k.includes("автобусныйпарк")){
    const n = k.match(/автобусныйпарк(\d+)/)?.[1];
    if(!n) return false;
    return p.includes("автобус") && p.includes(n);
  }

  if(k.includes("троллейбусныйпарк")){
    const n = k.match(/троллейбусныйпарк(\d+)/)?.[1];
    if(!n) return false;
    return p.includes("троллейбус") && p.includes(n);
  }

  if(k.includes("транспортныйпарк")){
    const n = k.match(/транспортныйпарк(\d+)/)?.[1];
    if(!n) return false;
    return p.includes("транспорт") && p.includes(n);
  }

  if(k.includes("трамвайныйпарк")){
    return p.includes("трамвай");
  }

  return p.includes(k);
}

/* =========================
   Filters
========================= */
function applyFilters(arr){

  const filters = {};
  document.querySelectorAll(".filters input").forEach(i=>{
    const v = (i.value || "").trim();
    if(v) filters[i.dataset.col] = v;
  });

  const keys = Object.keys(filters);
  if(!keys.length) return arr;

  return arr.filter(obj=>{
    for(const k of keys){
      const needle = normPlateRU(filters[k]).toLowerCase();
      const hay = normPlateRU((obj[k] ?? "").toString()).toLowerCase();
      if(!hay.includes(needle)) return false;
    }
    return true;
  });

}

/* =========================
   Render
========================= */
function renderTabs(){
  const wrap = document.getElementById("tabs");
  wrap.innerHTML = "";

  TAB_ORDER.forEach(t=>{
    const d = document.createElement("div");
    d.className = "tab" + (activeTab === t.key ? " active" : "");
    d.textContent = t.label;
    d.onclick = ()=>{
      activeTab = t.key;
      renderTabs();
      render();
    };
    wrap.appendChild(d);
  });
}

function render(){

  let arr = DATA.slice();

  // tab park filter
  if(activeTab !== "_all"){
    arr = arr.filter(v=>parkMatchesTab(v.park, activeTab));
  }

  // column filters
  arr = applyFilters(arr);

  // sort
  arr.sort(generalSort);

  VIEW = arr;

  const tbody = document.getElementById("data");
  tbody.innerHTML = "";

  const labels = {
    bus: "Автобусы и электробусы",
    troll: "Троллейбусы и ТУАХ",
    tram: "Трамваи",
    other: "Другое"
  };

  const order = ["bus","troll","tram","other"];

  for(const sec of order){

    const part = VIEW.filter(v=>transportSectionKey(v) === sec);
    if(!part.length) continue;

    const tr = document.createElement("tr");
    tr.className = "groupRow";
    tr.innerHTML = `<td colspan="9">${labels[sec]} (${part.length})</td>`;
    tbody.appendChild(tr);

    const frag = document.createDocumentFragment();

    for(const v of part){
      const row = document.createElement("tr");
      row.innerHTML =
        `<td>${v.type ?? ""}</td>` +
        `<td class="num">${v.vehicleNumber ?? ""}</td>` +
        `<td>${v.note ? "➜" : ""}</td>` +
        `<td>${v.year ?? ""}</td>` +
        `<td>${v.model ?? ""}</td>` +
        `<td>${v.park ?? ""}</td>` +
        `<td>${v.garageNumber ?? ""}</td>` +
        `<td>${v.factoryNumber ?? ""}</td>` +
        `<td>${v.livery ?? ""}</td>`;
      frag.appendChild(row);
    }

    tbody.appendChild(frag);
  }

  document.getElementById("status").textContent =
    `Записей: ${VIEW.length}. Сортировка: ${sortF}${sortDesc ? " (desc)" : ""}. Вкладка: ${activeTab}`;
}

/* =========================
   Events
========================= */
document.querySelectorAll("th[data-f]").forEach(th=>{
  th.onclick = ()=>{
    const f = th.dataset.f;
    if(sortF === f) sortDesc = !sortDesc;
    else { sortF = f; sortDesc = false; }
    render();
  };
});

document.querySelectorAll(".filters input").forEach(i=>{
  i.addEventListener("input", ()=>render());
});

/* =========================
   Load
========================= */
async function load(){
  try{
    const r = await fetch(JSON_URL, {cache:"no-store"});
    const j = await r.json();
    DATA = Array.isArray(j) ? j : (j.data || j.vehicles || j.items || []);
    renderTabs();
    render();
  }catch(e){
    console.error(e);
    document.getElementById("status").textContent = "Ошибка загрузки JSON. См. консоль.";
  }
}
load();

</script>
</body>
</html>
