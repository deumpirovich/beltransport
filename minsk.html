<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Реестр транспорта</title>

<style>
body{font-family:Arial;background:#f5f7fa;margin:0}
.container{max-width:1200px;margin:auto;padding:10px}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.tab{padding:4px 10px;border-radius:10px;border:1px solid #cfd7ea;background:#eef3ff;cursor:pointer;font-size:12px}
.tab.active{background:#2543a5;color:#fff}

table{border-collapse:collapse;background:#fff;width:100%;font-size:13px}
th,td{border-bottom:1px solid #eee;padding:6px;text-align:center;white-space:nowrap}
th{background:#ecf1fa;color:#2543a5;cursor:pointer}

.filters input{width:100%;box-sizing:border-box}

.groupRow td{background:#f4f7fc;font-weight:bold;color:#1c3789}
.num{color:#2543a5;font-weight:bold}
</style>
</head>

<body>
<div class="container">

<div class="tabs" id="tabs"></div>

<table>

<thead>
<tr>
<th data-f="type">Тип</th>
<th data-f="vehicleNumber">Номер</th>
<th></th>
<th data-f="year">Год</th>
<th data-f="model">Модель</th>
<th data-f="park">Парк</th>
<th data-f="garageNumber">Гаражный</th>
<th data-f="factoryNumber">Заводской</th>
<th data-f="livery">Цвет</th>
</tr>

<tr class="filters">
<th><input data-col="type"></th>
<th><input data-col="vehicleNumber"></th>
<th></th>
<th><input data-col="year"></th>
<th><input data-col="model"></th>
<th><input data-col="park"></th>
<th><input data-col="garageNumber"></th>
<th><input data-col="factoryNumber"></th>
<th><input data-col="livery"></th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

<script>

const JSON_URL="./minsk.json"

let DATA=[]
let VIEW=[]
let sortF="vehicleNumber"
let sortDesc=false
let activeTab="_all"

const TAB_ORDER=[
{key:"автобусныйпарк5",label:"АП5"},
{key:"автобусныйпарк6",label:"АП6"},
{key:"автобусныйпарк7",label:"АП7"},
{key:"транспортныйпарк1",label:"ТП1"},
{key:"транспортныйпарк2",label:"ТП2"},
{key:"троллейбусныйпарк3",label:"ТП3"},
{key:"транспортныйпарк4",label:"ТП4"},
{key:"троллейбусныйпарк5",label:"ТП5"},
{key:"трамвайныйпарк",label:"ТрамП"},
{key:"_all",label:"All"}
]

/* латиница → кириллица */
function normalizeLetters(s){
return (s||"").toUpperCase()
.replace(/A/g,"А")
.replace(/B/g,"В")
.replace(/C/g,"С")
.replace(/E/g,"Е")
.replace(/H/g,"Н")
.replace(/K/g,"К")
.replace(/M/g,"М")
.replace(/O/g,"О")
.replace(/P/g,"Р")
.replace(/T/g,"Т")
.replace(/X/g,"Х")
.replace(/Y/g,"У")
}

/* секции транспорта */
function section(v){
let t=(v.type||"").toLowerCase()
if(t==="автобус"||t==="электробус")return 1
if(t==="троллейбус"||t==="туах")return 2
if(t==="трамвай")return 3
return 9
}

/* длина буквенного префикса */
function prefixLen(s){
let m=s.match(/^([А-Я]{2,3})/)
return m?m[1].length:0
}

/* сортировка номера */
function numberSort(a,b){

let pa=normalizeLetters(a.vehicleNumber)
let pb=normalizeLetters(b.vehicleNumber)

let la=prefixLen(pa)
let lb=prefixLen(pb)

if(la!==lb)return la-lb

if(pa<pb)return -1
if(pa>pb)return 1
return 0
}

/* центральная сортировка */
function generalSort(a,b){

let sa=section(a)
let sb=section(b)

if(sa!==sb)return sa-sb

if(sortF==="vehicleNumber"){
let r=numberSort(a,b)
return sortDesc?-r:r
}

let va=(a[sortF]||"")+""
let vb=(b[sortF]||"")+""

if(va<vb)return sortDesc?1:-1
if(va>vb)return sortDesc?-1:1

return numberSort(a,b)
}

/* фильтры */
function applyFilters(arr){

let filters={}
document.querySelectorAll(".filters input").forEach(i=>{
if(i.value)filters[i.dataset.col]=normalizeLetters(i.value).toLowerCase()
})

return arr.filter(v=>{

for(let k in filters){

let val=normalizeLetters((v[k]||"")+"").toLowerCase()

if(!val.includes(filters[k]))return false

}

return true
})

}

/* вкладки */
function renderTabs(){

let wrap=document.getElementById("tabs")
wrap.innerHTML=""

TAB_ORDER.forEach(t=>{

let d=document.createElement("div")
d.className="tab"+(activeTab===t.key?" active":"")
d.textContent=t.label

d.onclick=()=>{
activeTab=t.key
renderTabs()
render()
}

wrap.appendChild(d)

})

}

/* рендер */
function render(){

VIEW=DATA.slice()

if(activeTab!=="_all"){
VIEW=VIEW.filter(v=>(v.park||"").toLowerCase().includes(activeTab.replace("парк","")))
}

VIEW=applyFilters(VIEW)

VIEW.sort(generalSort)

let tbody=document.getElementById("data")
tbody.innerHTML=""

let labels={
1:"Автобусы и электробусы",
2:"Троллейбусы и ТУАХ",
3:"Трамваи"
}

for(let s=1;s<=3;s++){

let part=VIEW.filter(v=>section(v)===s)

if(!part.length)continue

let tr=document.createElement("tr")
tr.className="groupRow"
tr.innerHTML="<td colspan=9>"+labels[s]+" ("+part.length+")</td>"
tbody.appendChild(tr)

part.forEach(v=>{

let row=document.createElement("tr")

row.innerHTML=
"<td>"+(v.type||"")+"</td>"+
"<td class=num>"+(v.vehicleNumber||"")+"</td>"+
"<td>"+(v.note?"➜":"")+"</td>"+
"<td>"+(v.year||"")+"</td>"+
"<td>"+(v.model||"")+"</td>"+
"<td>"+(v.park||"")+"</td>"+
"<td>"+(v.garageNumber||"")+"</td>"+
"<td>"+(v.factoryNumber||"")+"</td>"+
"<td>"+(v.livery||"")+"</td>"

tbody.appendChild(row)

})

}

}

/* сортировка кликом */
document.querySelectorAll("th[data-f]").forEach(th=>{
th.onclick=()=>{
let f=th.dataset.f
if(sortF===f)sortDesc=!sortDesc
else sortF=f
render()
}
})

document.querySelectorAll(".filters input").forEach(i=>{
i.oninput=render
})

/* загрузка */
async function load(){
let r=await fetch(JSON_URL)
let j=await r.json()
DATA=Array.isArray(j)?j:(j.data||j.vehicles||j.items||[])
renderTabs()
render()
}

load()

</script>
</body>
</html>
