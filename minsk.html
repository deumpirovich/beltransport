<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Реестр общественного транспорта</title>

<style>

body{
font-family:Arial;
background:#f5f7fa;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:10px;
}

.tabs{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:6px;
}

.tab{
padding:4px 10px;
border-radius:10px;
border:1px solid #cfd7ea;
background:#eef3ff;
cursor:pointer;
font-size:12px;
}

.tab.active{
background:#2543a5;
color:#fff;
}

table{
border-collapse:collapse;
background:#fff;
width:100%;
font-size:13px;
}

th,td{
border-bottom:1px solid #eee;
padding:6px;
text-align:center;
white-space:nowrap;
}

th{
background:#ecf1fa;
cursor:pointer;
color:#2543a5;
}

.groupRow td{
background:#f4f7fc;
font-weight:bold;
color:#1c3789;
}

.num{
color:#2543a5;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="tabs" id="tabs"></div>

<table>

<thead>
<tr>
<th data-f="type">Тип</th>
<th data-f="vehicleNumber">Номер</th>
<th></th>
<th data-f="year">Год</th>
<th data-f="model">Модель</th>
<th data-f="park">Парк</th>
<th data-f="garageNumber">Гаражный</th>
<th data-f="factoryNumber">Заводской</th>
<th data-f="livery">Цвет</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<script>

const JSON_URL="./minsk.json"

let DATA=[]
let VIEW=[]

let sortF="vehicleNumber"
let sortDesc=false
let activeTab="_all"

const TAB_ORDER=[
{key:"автобусныйпарк5",label:"АП5"},
{key:"автобусныйпарк6",label:"АП6"},
{key:"автобусныйпарк7",label:"АП7"},
{key:"транспортныйпарк1",label:"ТП1"},
{key:"транспортныйпарк2",label:"ТП2"},
{key:"троллейбусныйпарк3",label:"ТП3"},
{key:"транспортныйпарк4",label:"ТП4"},
{key:"троллейбусныйпарк5",label:"ТП5"},
{key:"трамвайныйпарк",label:"ТрамП"},
{key:"_all",label:"All"}
]

function normType(t){
return (t||"").toLowerCase().trim()
}

function typeLabel(t){
let n=normType(t)
if(n==="туах")return"ТУАХ"
return n.charAt(0).toUpperCase()+n.slice(1)
}

function typeOrder(t){

let n=normType(t)

if(n==="автобус")return 1
if(n==="электробус")return 2
if(n==="троллейбус")return 3
if(n==="туах")return 4
if(n==="трамвай")return 5

return 99

}

function transportSection(v){

let t=normType(v.type)

if(t==="автобус"||t==="электробус")return"bus"
if(t==="троллейбус"||t==="туах")return"troll"
if(t==="трамвай")return"tram"

return"other"

}

function sectionOrder(s){

if(s==="bus")return 1
if(s==="troll")return 2
if(s==="tram")return 3

return 9

}

function normalizePlate(s){

return (s||"")
.toUpperCase()
.replace(/[\s\-]/g,"")
.replace(/A/g,"А")
.replace(/B/g,"В")
.replace(/C/g,"С")
.replace(/E/g,"Е")
.replace(/H/g,"Н")
.replace(/K/g,"К")
.replace(/M/g,"М")
.replace(/O/g,"О")
.replace(/P/g,"Р")
.replace(/T/g,"Т")
.replace(/X/g,"Х")
.replace(/Y/g,"У")

}

function prefixLen(p){

let m=p.match(/^([А-Я]{2,3})/)
return m?m[1].length:0

}

function numberSort(a,b){

let pa=normalizePlate(a.vehicleNumber)
let pb=normalizePlate(b.vehicleNumber)

let secA=transportSection(a)
let secB=transportSection(b)

if(secA!==secB)return sectionOrder(secA)-sectionOrder(secB)

let la=prefixLen(pa)
let lb=prefixLen(pb)

if(la!==lb)return la-lb

let ma=pa.match(/^([А-Я]{2,3})/)
let mb=pb.match(/^([А-Я]{2,3})/)

if(ma&&mb){

if(ma[1]<mb[1])return-1
if(ma[1]>mb[1])return 1

}

let na=pa.match(/\d+/)
let nb=pb.match(/\d+/)

if(na&&nb){

let n1=parseInt(na[0])
let n2=parseInt(nb[0])

if(n1!==n2)return n1-n2

}

return pa.localeCompare(pb)

}

function garageColumn(s){

s=(s||"").toString().trim()

let m=s.match(/^\(?(\d)/)

return m?parseInt(m[1]):null

}

function garageSort(a,b){

let ak=a.garageNumber||""
let bk=b.garageNumber||""

let ca=garageColumn(ak)
let cb=garageColumn(bk)

if(ca!==cb)return ca-cb

let pa=ak.startsWith("(")
let pb=bk.startsWith("(")

if(pa!==pb)return pa?1:-1

return ak.localeCompare(bk)

}

function brandOrder(m){

let x=(m||"").toLowerCase()

if(x.includes("маз"))return 1
if(x.includes("бкм"))return 2
if(x.includes("неман"))return 3

return 9

}

function modelSort(a,b){

let ta=typeOrder(a.type)
let tb=typeOrder(b.type)

if(ta!==tb)return ta-tb

let ma=a.model||""
let mb=b.model||""

let ba=brandOrder(ma)
let bb=brandOrder(mb)

if(ba!==bb)return ba-bb

return ma.localeCompare(mb,"ru")

}

function factorySort(a,b){

let r=modelSort(a,b)

if(r!==0)return r

let fa=(a.factoryNumber||"").toUpperCase()
let fb=(b.factoryNumber||"").toUpperCase()

let na=fa.match(/^\d+/)
let nb=fb.match(/^\d+/)

if(na&&nb){

let n1=parseInt(na[0])
let n2=parseInt(nb[0])

if(n1!==n2)return n1-n2

}

return fa.localeCompare(fb)

}

function sortCompare(a,b){

if(sortF==="vehicleNumber")return numberSort(a,b)
if(sortF==="garageNumber")return garageSort(a,b)
if(sortF==="factoryNumber")return factorySort(a,b)
if(sortF==="model")return modelSort(a,b)

return numberSort(a,b)

}

function renderTabs(){

let wrap=document.getElementById("tabs")

wrap.innerHTML=""

for(let t of TAB_ORDER){

let div=document.createElement("div")

div.className="tab"+(activeTab===t.key?" active":"")

div.textContent=t.label

div.onclick=()=>{

activeTab=t.key

sortF="vehicleNumber"
sortDesc=false

renderTabs()
render()

}

wrap.appendChild(div)

}

}

function render(){

VIEW=DATA.filter(v=>{

if(activeTab==="_all")return true

return (v.park||"").toLowerCase().includes(activeTab.replace("парк",""))

})

VIEW.sort(sortCompare)

let tbody=document.getElementById("data")

tbody.innerHTML=""

let sec=["bus","troll","tram","other"]

let labels={
bus:"Автобусы и электробусы",
troll:"Троллейбусы и ТУАХ",
tram:"Трамваи",
other:"Другое"
}

for(let s of sec){

let part=VIEW.filter(v=>transportSection(v)===s)

if(!part.length)continue

let tr=document.createElement("tr")
tr.className="groupRow"
tr.innerHTML="<td colspan='9'>"+labels[s]+" ("+part.length+")</td>"
tbody.appendChild(tr)

for(let v of part){

let row=document.createElement("tr")

row.innerHTML=
"<td>"+typeLabel(v.type)+"</td>"+
"<td class='num'>"+(v.vehicleNumber||"")+"</td>"+
"<td>"+(v.note?"➜":"")+"</td>"+
"<td>"+(v.year||"")+"</td>"+
"<td>"+(v.model||"")+"</td>"+
"<td>"+(v.park||"")+"</td>"+
"<td>"+(v.garageNumber||"")+"</td>"+
"<td>"+(v.factoryNumber||"")+"</td>"+
"<td>"+(v.livery||"")+"</td>"

tbody.appendChild(row)

}

}

}

async function load(){

try{

let r=await fetch(JSON_URL)
let j=await r.json()

DATA=Array.isArray(j)?j:(j.data||j.vehicles||j.items||[])

renderTabs()
render()

}catch(e){

console.error(e)

}

}

document.querySelectorAll("th[data-f]").forEach(th=>{

th.onclick=()=>{

let f=th.getAttribute("data-f")

if(sortF===f)sortDesc=!sortDesc
else{

sortF=f
sortDesc=false

}

render()

}

})

load()

</script>

</body>
</html>
